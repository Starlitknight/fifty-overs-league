name: round-resolver
# Advances each multiplayer league by playing the next round in the REAL game
# engine (headless Chromium) and publishing the new snapshot. Runs on a schedule
# so matches resolve automatically in the background — even if nobody has the game
# open. Free (GitHub Actions); the service_role key lives ONLY in encrypted secrets.
on:
  schedule:
    # GitHub heavily delays or drops schedules that fire on the popular
    # quarter-hour marks; off-peak minutes fire far more reliably.
    - cron: '4,19,34,49 * * * *'
  workflow_dispatch: {}       # allow manual runs from the Actions tab

concurrency:
  group: round-resolver       # never run two passes at once
  cancel-in-progress: false

jobs:
  advance:
    runs-on: ubuntu-latest
    timeout-minutes: 12       # a wedged browser must not block later passes
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install resolver deps
        working-directory: resolver
        run: npm install playwright@1.56.1
      - name: Cache Chromium
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-1.56.1-${{ runner.os }}
      - name: Install Chromium
        if: steps.pw-cache.outputs.cache-hit != 'true'
        working-directory: resolver
        run: npx playwright install --with-deps chromium
      - name: Install Chromium system deps (cached browser)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        working-directory: resolver
        run: npx playwright install-deps chromium
      - name: Advance league rounds (one pass)
        working-directory: resolver
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node round.mjs
