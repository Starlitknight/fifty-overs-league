# CI for Fifty Overs: a reproducible build, unit tests INCLUDING the
# golden-master replay suite (test/replay.test.mjs — the built page must
# reproduce recorded ball-by-ball logs bit-for-bit; this replaced the old
# pinned-engine sha check), on every push; a GitHub Pages artifact deploy
# that only runs from the default branch AFTER tests pass.
#
# IMPORTANT — current publication path: the live site is served by GitHub
# Pages directly from committed root files (index.html / client/game.html on
# the default branch). Switching the Pages source to "GitHub Actions" without
# coordination would take the game offline, so the deploy job below is gated
# behind the repository variable PAGES_VIA_ACTIONS. Follow-up: flip the
# Pages source to Actions in repo settings,
# set PAGES_VIA_ACTIONS=true, and the artifact deploy takes over atomically.
#
# No secrets are read or written here. Supabase service-role keys must never
# appear in this workflow, the repository, or the browser bundle.
name: CI & Pages

on:
  push:
    branches: [main, 'feat/**', 'claude/**']
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Syntax-check every engine module
        run: |
          for f in engine/src/*.js engine/src/presentation/*.js; do node --check "$f"; done
          python3 -c "
import sys
names=[n for n in open('engine/src/league/manifest.txt').read().split() if n]
open('/tmp/league-cat.js','w').write(''.join(open('engine/src/league/'+n).read() for n in names))"
          node --check /tmp/league-cat.js
      - name: Build site from engine + overlay + bundle
        run: ./build.sh
      - name: Unit tests + golden-master replays (gameplay must be bit-identical)
        run: node --test test/*.test.mjs
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: test-and-build
    if: github.ref == 'refs/heads/main' && vars.PAGES_VIA_ACTIONS == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
