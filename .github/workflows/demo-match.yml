name: demo-match
# One-tap demo: creates a demo opponent, gives both teams a real squad, and plays
# a match immediately — so a founder can watch a real game before inviting anyone.
on:
  workflow_dispatch:
    inputs:
      league_id:
        description: 'Your league id'
        required: true

jobs:
  demo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install resolver deps
        working-directory: resolver
        run: npm install playwright@1.56.1
      - name: Install Chromium
        working-directory: resolver
        run: npx playwright install --with-deps chromium
      - name: Set up and play the demo match
        working-directory: resolver
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node demo.mjs "${{ inputs.league_id }}"
