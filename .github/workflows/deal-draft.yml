name: deal-draft
# Founder runs this once (Actions tab → Run workflow) after all managers have
# joined: it locks the manager count, generates a real engine master pool, and
# snake-deals equal private buckets to each manager.
on:
  workflow_dispatch:
    inputs:
      league_id:
        description: 'League id to deal the draft for'
        required: true
      per_manager:
        description: 'Players in each manager''s private pool'
        required: false
        default: '15'

jobs:
  deal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install resolver deps
        working-directory: resolver
        run: npm install playwright@1.56.1
      - name: Install Chromium
        working-directory: resolver
        run: npx playwright install --with-deps chromium
      - name: Deal the draft
        working-directory: resolver
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node deal.mjs "${{ inputs.league_id }}" "${{ inputs.per_manager }}"
