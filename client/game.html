/* ================= FULL UPGRADE DESIGN SYSTEM ================= */
:root{--bg:#edf0f2;--surface:#ffffff;--surface-soft:#f7fafc;--border:#d4d9de;--nav:#303030;--blue:#3496bd;--blue-dark:#25789a;--orange:#f18a1e;--green:#2f8f46;--red:#b23a33;--gold:#c99a2e;--text:#202428;--muted:#66717a;--shadow-sm:0 1px 2px rgba(0,0,0,.08);--shadow-md:0 3px 10px rgba(0,0,0,.10);--radius:4px}
body{background:var(--bg);color:var(--text);font:13px Verdana,Aptos,system-ui,sans-serif;line-height:1.48}
.wrap{max-width:1280px;padding:14px 16px}.wrap.match-mode{max-width:1440px}
#topbar{background:var(--nav);border-bottom:3px solid var(--blue);gap:0;flex-wrap:nowrap;overflow-x:auto}
#topbar a{font-size:12px;padding:9px 10px;white-space:nowrap}#topbar .brand{font-size:14px;padding:9px 14px 9px 4px;white-space:nowrap}
#topbar a.on{background:var(--blue);box-shadow:inset 0 -3px 0 var(--orange)}#fo-top-status{margin-left:auto;display:flex;gap:10px;align-items:center;white-space:nowrap;color:#e9eef2;font-size:11px;padding:0 8px}#fo-top-status span{border-left:1px solid #5b5b5b;padding-left:10px}
.panel,.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-sm);margin-bottom:12px}.panel>h4,.card-title{background:linear-gradient(180deg,var(--blue),var(--blue-dark));color:#fff;font-weight:bold;font-size:12.5px;padding:7px 10px;margin:0;border-radius:var(--radius) var(--radius) 0 0}.card-body{padding:11px 12px}.panel .pad{padding:10px 12px}
.crumb{font-size:14px;border-left:4px solid var(--orange);margin-bottom:12px}.page-head{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;margin:4px 0 14px}.page-head h1,.welcome-hero h1{font-size:26px;line-height:1.1;margin:3px 0 5px;color:#162a3a}.page-head p,.welcome-hero p{color:var(--muted);margin:0;max-width:760px}.eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--blue-dark);font-weight:bold}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:12px}.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;box-shadow:var(--shadow-sm)}.kpi-card span{display:block;color:var(--muted);font-size:11px}.kpi-card b{display:block;font-size:18px;margin-top:2px;color:var(--text)}

.page-grid-2{display:grid;grid-template-columns:minmax(0,1fr) minmax(320px,.75fr);gap:14px}.page-grid-3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}.page-grid-draft{display:grid;grid-template-columns:minmax(0,1fr) 330px;gap:14px;align-items:start}.draft-sticky{position:sticky;top:8px}

  else{v+=14*grip*(ctx.pitch==='dry'?1.6:1)-8*nb;if(ctx.weather==='dew later'&&ctx.chase)v-=4}
  if(ctx.pitch==='cracked')v+=4;if(ctx.pitch==='twoPaced')v+=3;

  if(T.includes('deathSpecialist')&&(ctx.over??20)>=40)v+=5;
  if(T.includes('partnershipBreaker')&&(ctx.pship??0)>=50)v+=5;

function resolveMarket(){
  econInit();const S=App.season;const me=userTeam();const news=[];
  let h=(S.round*40503+7)>>>0;const rnd=()=>((h=(h*1103515245+12345)>>>0)/4294967296);
  for(const l of App.market.listed){
    const fp=findPlayer(l.name);if(!fp){continue}
    const rc=roleClass(fp.p);
    let best=null;
    for(let i=0;i<GD.teams.length;i++){
      const t=GD.teams[i];if(t.name===l.seller)continue;
      if(t.players.length>=18)continue;
      const isMe=(i===App.teamIx);
      if(isMe){const my=App.market.myBids[l.name]|0;
        if(my>=l.base&&my<=App.fin.bank&&(!best||my>best.amt))best={t,amt:my,me:true};
        continue;}
      const val=playerValue(fp.p)*clubNeed(t,rc)*(0.8+0.45*rnd());
      const amt=Math.round(val/500)*500;
      if(amt>=l.base&&amt<=t.bank*0.4&&(!best||amt>best.amt))best={t,amt,me:false};
    }
    if(best){
      const from=GD.teams.find(t=>t.name===l.seller);
      const ix=from.players.findIndex(p=>p.name===l.name);
      const[pl]=from.players.splice(ix,1);
      best.t.players.push(pl);
      if(best.me)ledger('Bought '+pl.name,-best.amt);else if(from===me)ledger('Sold '+pl.name,+best.amt);
      if(!best.me)best.t.bank-=best.amt;
      if(from!==me)from.bank+=best.amt;
      news.push(pl.name+' → '+best.t.name+' for $'+best.amt.toLocaleString());
    }
  }
  App.market.listed=[];App.market.myBids={};
  if(news.length)App.news=(news.map(n=>'TRANSFER: '+n)).concat(App.news||[]).slice(0,12);
}

// ---------- Season / league ----------
function makeSchedule(n){const ids=[...Array(n).keys()];const rounds=[];
  for(let r=0;r<n-1;r++){const rd=[];
    for(let i=0;i<n/2;i++){const a=ids[i],b=ids[n-1-i];rd.push(r%2?[b,a]:[a,b])}
    rounds.push(rd);ids.splice(1,0,ids.pop())}
  return rounds}
function seasonInit(){if(App.season)return;
  const single=makeSchedule(GD.teams.length);
  const back=single.map(rd=>rd.map(([a,b])=>[b,a]));
  App.season={schedule:single.concat(back),round:0,played:{}}}
function fixtureKey(r,f){return r+':'+GD.teams[f[0]].name+':'+GD.teams[f[1]].name}
function leagueRows(comp){comp=comp||'league';
  const T={};for(const t of GD.teams)T[t.name]={p:0,w:0,l:0,t:0,pts:0,rf:0,of:0,ra:0,oa:0};
  for(const r of App.results){if(r.comp!==comp)continue;
    const i1=r.innings[0],i2=r.innings[1];if(!i1||!i2)continue;
    const s={};
    s[i1.batTeam]={runs:i1.runs,ov:i1.wkts>=10?50:i1.legal/6};
    s[i2.batTeam]={runs:i2.runs,ov:i2.wkts>=10?50:i2.legal/6};
    for(const nm of [i1.batTeam,i2.batTeam]){const o=nm===i1.batTeam?i2.batTeam:i1.batTeam;
      T[nm].p++;T[nm].rf+=s[nm].runs;T[nm].of+=s[nm].ov;T[nm].ra+=s[o].runs;T[nm].oa+=s[o].ov;
      if(!r.result.winner)T[nm].t++,T[nm].pts+=1;
      else if(r.result.winner===nm)T[nm].w++,T[nm].pts+=2;
      else T[nm].l++;}}
  return Object.entries(T).map(([nm,x])=>({nm,...x,nrr:x.of&&x.oa?(x.rf/x.of-x.ra/x.oa):0}))
    .sort((a,b)=>b.pts-a.pts||b.nrr-a.nrr);
}
function mpOrdersMap(aIx,bIx){
  mpInit();const map={};
  for(const ix of [aIx,bIx]){
    const pk=App.mp.packets[ix];
    if(pk&&App.season&&pk.round===App.season.round)map[GD.teams[ix].name]=pk.orders;
    if(ix===App.teamIx&&App.orders&&App.orders.saved)map[GD.teams[ix].name]=App.orders;
  }
  return map;

function compilePlan(){
  const plan=new Array(50).fill(null);const tot={};const warns=[];
  for(const end of ['north','south']){
    for(const sp of App.orders.spells[end]){
      if(!sp.bowler||!sp.first||!sp.n)continue;
      const parity=end==='north'?1:0; // north = odd overs (1,3,..), display 1-based
      if(sp.first%2!==(end==='north'?1:0))warns.push(`${sp.bowler}: 1st over ${sp.first} is not a ${end} end over`);
      for(let k=0;k<sp.n;k++){
        const ov=sp.first+2*k;
        if(ov<1||ov>50)continue;
        if(plan[ov-1])warns.push(`Over ${ov}: double-booked (${plan[ov-1]} / ${sp.bowler})`);
        plan[ov-1]=sp.bowler;tot[sp.bowler]=(tot[sp.bowler]||0)+1;
      }
    }
  }
  for(const b in tot)if(tot[b]>10)warns.push(`${b}: ${tot[b]} overs planned (max 10)`);
  for(let o=0;o<49;o++)if(plan[o]&&plan[o]===plan[o+1])warns.push(`${plan[o]}: consecutive overs ${o+1}-${o+2}`);
  const covered=plan.filter(Boolean).length;
  if(covered<50)warns.push(`Only ${covered}/50 overs assigned - AI fills gaps`);
  App.orders.compiled=plan;App.orders.tot=tot;
  return{plan,tot,warns,covered};
}

  else if(kind==='spin')bs.sort((a,b)=>((typeClass(b.bowlType)==='spin')-(typeClass(a.bowlType)==='spin'))||((b.threat+b.control)-(a.threat+a.control)));
  else bs.sort((a,b)=>(b.threat+b.control)-(a.threat+a.control));

}

function moveBat(i,d){const o=App.orders.batOrder;const j=i+d;if(j<0||j>=o.length)return;
  [o[i],o[j]]=[o[j],o[i]];pgOrders();}
function autoArrange(){
  const t=userTeam();const xi=pickXI(t);
  const B=App.orders.budget||{};
  const opts=t.players.filter(p=>p.bowlType&&(App.orders.showPT||!isPT(p))).filter(p=>(B[p.name]|0)>0);
  const left={};let tot=0;for(const p of opts){left[p.name]=Math.min(10,B[p.name]|0);tot+=left[p.name]}
  if(tot!==50){App.orders._budgetWarn='Budgets total '+tot+' - need exactly 50.';pgOrders();return}
  App.orders._budgetWarn='';
  const isPace=p=>typeClass(p.bowlType)==='pace';
  const nbVal=p=>(0.6*p.threat+0.4*p.control)+((p.talents||[]).includes('newBallSpecialist')?8:0)+(isPace(p)?6:0);
  const dVal=p=>(0.5*p.control+0.5*p.threat)+((p.talents||[]).includes('deathSpecialist')?9:0);
  const mVal=p=>(0.5*p.threat+0.5*p.control)+(!isPace(p)?7:0);
  const pool=opts.slice();
  const take=(scoreFn,excl)=>{const c=pool.filter(p=>left[p.name]>0&&!excl.includes(p.name)).sort((a,b)=>scoreFn(b)-scoreFn(a))[0];return c?c.name:null};
  const a=new Array(51).fill(null); // 1-indexed overs
  const nb1=take(nbVal,[]),nb2=take(nbVal,[nb1]);
  const d1=take(dVal,[]),d2=take(dVal,[d1]);
  const assign=(ov,nm)=>{if(nm&&left[nm]>0){a[ov]=nm;left[nm]--;return true}return false};
  for(let o=1;o<=9;o+=2)if(!assign(o,nb1))break;
  for(let o=2;o<=10;o+=2)if(!assign(o,nb2))break;
  for(let o=50;o>=42;o-=2)if(!assign(o,d1))break;
  for(let o=49;o>=41;o-=2)if(!assign(o,d2))break;
  // middle + gaps: greedy by mVal, keeping same-end continuity for spell shape
  for(const end of [1,0]){ // odd end first
    let cur=null;
    for(let o=11+(end?0:1);o<=40;o+=2){
      if(a[o])continue;
      if(cur&&left[cur]>0){a[o]=cur;left[cur]--;continue}
      cur=take(mVal,[a[o-1]||'']);if(!assign(o,cur))cur=null;
    }}
  for(let o=1;o<=50;o++){if(a[o])continue;
    const nm=take(mVal,[a[o-1]||'',a[o+1]||'']);if(!assign(o,nm)){const any=take(()=>1,[]);assign(o,any)}}
  // derive spells per end from contiguous runs
  const spells={north:[],south:[]};
  for(const end of ['north','south']){
    const start=end==='north'?1:2;
    let run=null;
    for(let o=start;o<=50;o+=2){
      const nm=a[o];
      if(run&&run.bowler===nm){run.n++;continue}
      if(run)spells[end].push(run);
      run=nm?{bowler:nm,first:o,n:1,field:o<=10?'att':(o>=41?'def':'bal')}:null;
    }
    if(run)spells[end].push(run);
  }
  App.orders.spells=spells;
  pgOrders();
}

function gridToSpells(){

    for(let o=start;o<=50;o+=2){
      const nm=a[o];
      if(run&&run.bowler===nm){run.n++;continue}
      if(run&&run.bowler)spells[end].push(run);
      run=nm?{bowler:nm,first:o,n:1,field:o<=10?'att':(o>=41?'def':'bal')}:null;
    }
    if(run&&run.bowler)spells[end].push(run);

function foOrdersHardWarns(){ // illegal (blocking) problems only - under-coverage is AI-filled and allowed
  try{const v=compilePlan();
    return (v.warns||[]).filter(w=>!/AI fills gaps/.test(w));
  }catch(e){return []}
}
function pgMatch(){

  if((!M||M.done)&&App.pending){
    const hard=foOrdersHardWarns();
    if(hard.length){
      $('#page').innerHTML=crumb('Match centre')+'<div class="panel"><h4>Bowling orders are not legal</h4><div class="pad">'+
        hard.map(w=>'<div class="warntxt">⚠ '+esc(w)+'</div>').join('')+
        '<div style="margin-top:6px">Fix these before the match can start. Max 10 overs per bowler, no bowler may bowl two overs in a row, no double-booked overs.</div>'+
        '<div class="ctlrow" style="margin-top:8px"><a href="#/orders"><button class="primary">Back to Orders</button></a></div></div></div>';
      return;
    }
  }
  if(!M||M.done&&App.pending){startPendingIfNeeded()}
  renderMatch();
}

function startFlip(call){
  App.tossState={stage:'flip',call};
  renderMatch();
  setTimeout(()=>{
    resolveToss(call);
    const flip=App.tossState.flip||'';
    // brief landing frame
    const c=document.querySelector('.coin');
    if(c){c.classList.remove('flipping');c.classList.add(flip==='T'?'show-t':'show-h');
      setTimeout(()=>renderMatch(),650);}
    else renderMatch();
  },1400);
}
function resolveToss(call){
  const flip=M.rand()<0.5?'H':'T';
  const won=call===flip;
  if(won){
    App.tossState={stage:'decide',flip};
    if(App.orders.tossCall){applyToss(App.orders.tossDecision==='bat')}
  }else{
    const aiBats=aiTossDecision();
    App.tossState={stage:'done',flip,txt:`${M.ai.name} won the toss and chose to ${aiBats?'bat':'bowl'}.`};
    applyToss(!aiBats);
  }
}
function applyToss(userBatsFirst){
  const bat1=userBatsFirst?M.user:M.ai,bowl1=userBatsFirst?M.ai:M.user;
  M.innings[0]=mkInns(bat1,bowl1);M.batFirstTeam=bat1.name;
  if(App.tossState.stage!=='done')App.tossState={stage:'done',txt:`${M.user.name} won the toss and chose to ${userBatsFirst?'bat':'bowl'}.`};
  render();
}

function saveMatch(m){
  const r={ix:App.results.length,date:m.meta?m.meta.date:simDate(),home:m.meta.home,away:m.meta.away,
    ground:m.meta.ground,pitch:m.pitch,weather:m.meta.weather,seed:m.seed,result:m.result,
    innings:m.innings,worm:m.worm,log:m.log,comp:m.meta.comp||'friendly',round:m.meta.round??null};
  App.results.push(r);
  if(r.comp==='league'&&App.season)App.season.played[r.round+':'+r.home+':'+r.away]=r.ix;
  if(m.isUserMatch){App.pending=null;App.orders.saved=false}
  const played=new Set();
  for(const inn of m.innings){if(!inn)continue;
    for(const b of inn.bat){if(b.b>0||b.out){
      played.add(b.p.name);
      (App.playerHist[b.p.name]=App.playerHist[b.p.name]||[]).push({date:r.date,teams:r.home+' v '+r.away,
        bat:`${b.r} (${b.b})`,bowl:'-',rr:b.r,bb:b.b,o:!!b.out,w:0,cr:0,cb:0,s6:b.f6||0,s4:b.f4||0});
      const pl=findPlayer(b.p.name);if(pl){
        if(b.r>=50)pl.p.formIx=Math.min(6,(pl.p.formIx??3)+1);
        else if(b.r<10&&b.out)pl.p.formIx=Math.max(1,(pl.p.formIx??3)-1);
        pl.p.formWord=FORMW[pl.p.formIx??3];
        const thrB=(pl.p.keeper||pl.p.name===App.orders.captain)?75:90;
        pl.p.fatigue=(b.b>=thrB)?'tired':(pl.p.fatigue==='tired'?'rested':pl.p.fatigue);}}}
    for(const k in inn.bowlers){const br=inn.bowlers[k];
      played.add(k);
      const h=(App.playerHist[k]=App.playerHist[k]||[]);
      const last=h[h.length-1];
      const line=`${Math.floor(br.b/6)}.${br.b%6}-${br.r}-${br.w}`;
      if(last&&last.date===r.date&&last.teams===r.home+' v '+r.away){last.bowl=line;last.w=br.w;last.cr=br.r;last.cb=br.b}
      else h.push({date:r.date,teams:r.home+' v '+r.away,bat:'-',bowl:line,rr:0,bb:0,o:false,w:br.w,cr:br.r,cb:br.b});
      const pl=findPlayer(k);if(pl){
        if(br.w>=3)pl.p.formIx=Math.min(6,(pl.p.formIx??3)+1);
        else if(br.b>=36&&br.w===0&&br.r/(br.b/6)>6.8)pl.p.formIx=Math.max(1,(pl.p.formIx??3)-1);
        pl.p.formWord=FORMW[pl.p.formIx??3];
        const thrW=(pl.p.keeper||pl.p.name===App.orders.captain)?42:48;
        pl.p.fatigue=(br.b>=thrW)?'tired':(pl.p.fatigue==='tired'?'rested':pl.p.fatigue);}}
  }
  for(const inn of m.innings){if(!inn||!inn.fielding)continue;
    for(const k in inn.fielding){const f=inn.fielding[k];
      const a=(App.fieldStats=App.fieldStats||{});a[k]=a[k]||{ct:0,st:0,ro:0};
      a[k].ct+=f.ct;a[k].st+=f.st;a[k].ro+=f.ro;}}
  return r;
}

function pgScorecard(q){
  let innings,meta;
  if(q.i!==undefined&&App.results[+q.i]){const r=App.results[+q.i];innings=r.innings;meta=r}
  else if(M){innings=M.innings;meta={home:M.meta.home,away:M.meta.away,result:M.result||{text:'in progress'}}}
  if(!innings||!innings[0]){$('#page').innerHTML=crumb('Scorecard')+'<div class="panel"><div class="pad">No match selected. See <a href="#/matches">Matches</a>.</div></div>';return}
  const cards=innings.filter(Boolean).map(inn=>{
    const bat=inn.bat.filter(b=>b.b>0||b.out).map(b=>`<tr><td>${playerLink(b.p)}${b.out?'':' *'} ${sdot(aggBat(b.p),'Batting')}</td><td class="small">${esc(b.out||'not out')}</td><td class="n"><b>${b.r}</b></td><td class="n">${b.b}</td><td class="n">${b.f4}</td><td class="n">${b.f6}</td><td class="n">${b.b?(100*b.r/b.b).toFixed(0):'-'}</td></tr>`).join('');
    const bowl=Object.values(inn.bowlers).sort((a,b)=>b.w-a.w||a.r-b.r).map(r=>`<tr><td>${playerLink(r.p)} ${sdot(aggBowl(r.p),'Bowling')}</td><td class="n">${Math.floor(r.b/6)}.${r.b%6}</td><td class="n">-</td><td class="n">${r.r}</td><td class="n"><b>${r.w}</b></td><td class="n">${r.b?(r.r/(r.b/6)).toFixed(2):'-'}</td><td class="n">${r.wd||0}</td><td class="n">${r.nb||0}</td></tr>`).join('');

function teamRatings(r,teamName){
  const agg={top:[0,0],mid:[0,0],tail:[0,0]};
  let seam=[0,0,0],spin=[0,0,0];let catches=0,ros=0,sts=0;
  for(const inn of r.innings){if(!inn)continue;
    if(inn.batTeam===teamName)inn.bat.forEach((b,i)=>{const g=i<3?'top':(i<7?'mid':'tail');agg[g][0]+=b.r;agg[g][1]+=b.b});
    if(inn.bowlTeam===teamName){
      for(const k in inn.bowlers){const br=inn.bowlers[k];
        const t=typeClass(br.p.bowlType||'fastMedium')==='pace'?seam:spin;t[0]+=br.w;t[1]+=br.r;t[2]+=br.b;}
      for(const k in (inn.fielding||{})){catches+=inn.fielding[k].ct;sts+=inn.fielding[k].st;ros+=inn.fielding[k].ro}}}
  const scale=v=>v===null?null:Math.round(70*Math.max(5,Math.min(97,v)));
  const batR=g=>{const[r0,b0]=agg[g];if(!b0)return null;
    const sr=100*r0/b0;const parSR={top:82,mid:88,tail:80}[g];
    return 50+(sr-parSR)/2+(r0-{top:110,mid:95,tail:25}[g])/8};
  const bowlR=t=>{const[w,r0,b0]=t;if(!b0)return null;
    const econ=r0/(b0/6),srr=w?b0/w:99;
    return 50+(5.3-econ)*8+(45-Math.min(90,srr))/3};
  return{
   'Batting - Top Order':[scale(batR('top')),null],
   'Batting - Middle Order':[scale(batR('mid')),null],
   'Batting - Tail':[scale(batR('tail')),null],
   'Bowling - Seam':[scale(bowlR(seam)),Math.round(seam[2]/6)],
   'Bowling - Spin':[scale(bowlR(spin)),Math.round(spin[2]/6)],
   'Fielding/Keeping':[scale(42+catches*3+sts*4+ros*5),null]};
}
function ratingsTable(r){
  const A=r.home,B=r.away;
  const RA=teamRatings(r,A),RB=teamRatings(r,B);
  let sumA=0,sumB=0;
  const rows=Object.keys(RA).map(k=>{
    const[a,oa]=RA[k],[b,ob]=RB[k];
    if(a)sumA+=a;if(b)sumB+=b;
    const cell=(v,o,win)=>v===null?'<td class="n small">-</td>':`<td class="n" style="${win?'font-weight:bold;color:#1c5537':''}">${v.toLocaleString()}${o?` <span class="small">(${o})</span>`:''}</td>`;
    return `<tr><td>${k}</td>${cell(a,oa,a&&(!b||a>=b))}${cell(b,ob,b&&(!a||b>a))}</tr>`}).join('');
  return `<table><tr><th></th><th class="n">${esc(A)}</th><th class="n">${esc(B)}</th></tr>${rows}
   <tr style="border-top:2px solid var(--ftp-border)"><td><b>Overall</b></td><td class="n"><b>${sumA.toLocaleString()}</b></td><td class="n"><b>${sumB.toLocaleString()}</b></td></tr></table>
   <div class="small" style="margin-top:3px">Performance normalised against real-ODI par for each unit, on the club rating scale. Overs in brackets.</div>`;
}
function fantasyPoints(r){
  const pts={};
  for(const inn of r.innings){if(!inn)continue;
    for(const b of inn.bat)if(b.b>0||b.out)pts[b.p.name]=(pts[b.p.name]||0)+b.r+(b.f6||0)*2+(b.r>=50?10:0)+(b.r>=100?20:0);
    for(const k in inn.bowlers){const br=inn.bowlers[k];pts[k]=(pts[k]||0)+br.w*20+(br.w>=3?15:0)+Math.max(0,Math.round((5.3-(br.r/(Math.max(1,br.b)/6)))*br.b/12))}
    for(const k in (inn.fielding||{})){const f=inn.fielding[k];pts[k]=(pts[k]||0)+f.ct*10+f.st*15+f.ro*10}}
  return Object.entries(pts).sort((a,b)=>b[1]-a[1]).slice(0,5);
}

const MANUAL_HTML=`<h2>Game Manual</h2>
<p>Welcome to <strong>Fifty Overs</strong>, a tactical one-day cricket management game. You are not just picking eleven names and watching a score appear. You are managing a club: selecting XIs, reading pitches, planning bowling spells, developing young players, handling fatigue, balancing wages, improving academies, and trying to turn a squad of flawed cricketers into a champion side.</p>
<p>Every match is played by a ball-by-ball engine. The engine does not script comebacks, collapse a team for drama, or decide that your best batter "should" fail today. Each delivery starts from real one-day cricket probabilities, then shifts those odds according to the players, the pitch, the weather, the match situation, form, fatigue, field settings, intent, and talents. Better players move the odds in your favour. They do not remove luck from cricket.</p>
<hr>
<h3 id="quick-start">Quick Start</h3>
<p>Sigh. You are one of those managers who will not read the whole manual before pressing buttons. Fine. Here is the version that might stop you from losing your first three matches by forgetting to pick a wicketkeeper.</p>
<ol>
<li><strong>Start on the Club page.</strong> This is your dashboard. It shows fixtures, the league table, recent results, upcoming matches, and the current in-game date.</li>
<li><strong>Check your next fixture.</strong> Look at the opponent, venue, pitch, and weather. A green pitch in humid conditions is not the same game as a flat pitch in scorching heat.</li>
<li><strong>Open Squad.</strong> Find your best batters, your real bowlers, your keeper, your captain, and anyone who is tired enough to be a liability.</li>
<li><strong>Press Prepare.</strong> This takes you to Orders for the next match. Pick an XI that suits the conditions, not just the eleven highest ratings.</li>
<li><strong>Set your batting order.</strong> Openers face the hardest new-ball period. Middle-order players rebuild or accelerate. The tail should ideally not be batting in the 23rd over, but cricket has opinions.</li>
<li><strong>Choose a keeper and captain.</strong> Your keeper affects catches, stumpings and keeping quality. Your captain gives a small but real tactical benefit.</li>
<li><strong>Set your toss plan.</strong> Decide what you want to do if you win the toss. Conditions, dew, pitch type and your squad balance should all matter.</li>
<li><strong>Plan the bowling.</strong> Build spells from the two ends. Bowlers cannot bowl consecutive overs and no bowler can exceed 10 overs in a 50-over innings.</li>
<li><strong>Save orders and play.</strong> Watch ball by ball, simulate an over, simulate an innings, or simulate the whole match.</li>
<li><strong>Read the report.</strong> Do not just stare at the result. The scorecard, match ratings and report tell you which part of your side actually won or lost the game.</li>
<li><strong>Complete the round.</strong> Other fixtures are played, training lands, form and fatigue update, and the season moves on.</li>
</ol>
<div class="manual-tip"><strong>Manager tip:</strong> The fastest way to improve is to stop picking the same XI blindly. Read the pitch, read the weather, check fatigue, and use the Nets before important matches.</div>
<hr>
<h3 id="club">Your Club</h3>
<p>The Club page is your home base. It tells you what is happening now, what is coming next, and how your season is going.</p>
<p>From here you can see your upcoming fixtures, recent results, league position, current date and time, and the wider club situation. Think of it as your manager's office: not where you make every decision, but where you notice what decisions need making.</p>
<h4>Fixtures</h4>
<p>Fixtures show who you are playing, where you are playing, and what conditions are expected. Home matches are where your ground and pitch choices matter most. Away matches require adaptation. A squad that looks perfectly balanced on your own surface can look awkward on a dry turner or a green seamer.</p>
<h4>League Table</h4>
<p>The table shows wins, losses, points and net run rate. In close seasons, net run rate can matter. Winning comfortably is better than scraping home, and losing narrowly is better than being bowled out for 96 while chasing 310.</p>
<h4>Recent Results and Upcoming Events</h4>
<p>Recent results show the story of your club. Upcoming events tell you what needs attention: league matches, cup fixtures, training rounds and market activity.</p>
<div class="manual-tip"><strong>Manager tip:</strong> Do not use the Club page only to click into matches. Use it to plan the next three rounds. A tired bowler today may cost you a cup match tomorrow.</div>
<hr>
<h3 id="squad">Your Squad</h3>
<p>Your squad is the real game. Tactics can steal matches, but squad construction wins seasons.</p>
<h4>Player Information</h4>
<p>Each player has visible skills, age, rating, form, fatigue, role, bowling type, captaincy and talents. Some players are obvious specialists. Some are awkward but valuable. A player with ordinary batting and excellent bowling is not a failed batter; he is a bowler who should probably bat at nine.</p>
<h4>Rating</h4>
<p>A player's rating is a useful summary, but it is not the truth. A high-rating player can still be the wrong pick if he is tired, poorly suited to the pitch, or filling a role your XI does not need. Use rating as a starting point, not as a manager replacement device.</p>
<div class="manual-tip"><strong>Manager tip:</strong> Build XIs, not collections of stars. A side needs top-order stability, middle-order flexibility, five usable bowlers, a keeper, fielders, stamina, and someone you trust at the death.</div>
<hr>
<h3 id="skills">Player Skills</h3>
<p>Every player is described using skill words. These words sit on a single ladder:</p>
<table><thead><tr><th>Rank</th><th>Skill Word</th><th>Rank</th><th>Skill Word</th></tr></thead><tbody>
<tr><td>1</td><td>atrocious</td><td>9</td><td>accomplished</td></tr>
<tr><td>2</td><td>dreadful</td><td>10</td><td>expert</td></tr>
<tr><td>3</td><td>poor</td><td>11</td><td>outstanding</td></tr>
<tr><td>4</td><td>ordinary</td><td>12</td><td>spectacular</td></tr>
<tr><td>5</td><td>average</td><td>13</td><td>exceptional</td></tr>
<tr><td>6</td><td>reasonable</td><td>14</td><td>world class</td></tr>
<tr><td>7</td><td>capable</td><td>15</td><td>elite</td></tr>
<tr><td>8</td><td>reliable</td><td>16</td><td>legendary</td></tr>
</tbody></table>
<p>The words are descriptive, not decorative. A reliable player is a serious first-XI cricketer. An expert player is one of the better players in the league. A legendary player is rare and should not be hidden at number eight because you like round numbers.</p>
<h4>Batting Skills</h4>
<table><thead><tr><th>Skill</th><th>What it Means</th><th>Manager Use</th></tr></thead><tbody>
<tr><td><strong>vs Pace</strong></td><td>Ability against seam, swing, bounce and speed.</td><td>Important for openers, new-ball survival and green/overcast conditions.</td></tr>
<tr><td><strong>vs Spin</strong></td><td>Ability against finger spin, wrist spin, grip and turn.</td><td>Important on dry, slow and cracked pitches, especially in the middle overs.</td></tr>
<tr><td><strong>Power</strong></td><td>Ability to turn scoring chances into boundaries and sixes.</td><td>Useful for finishers, chases, flat pitches and death-over acceleration.</td></tr>
<tr><td><strong>Rotation</strong></td><td>Ability to avoid dots and find singles and twos.</td><td>Vital on slow, windy or two-paced pitches where clean boundaries are harder.</td></tr>
<tr><td><strong>Temperament</strong></td><td>Composure, innings management and pressure resistance.</td><td>Useful for anchors, chases, collapses and players batting in difficult phases.</td></tr>
</tbody></table>
<h4>Bowling Skills</h4>
<table><thead><tr><th>Skill</th><th>What it Means</th><th>Manager Use</th></tr></thead><tbody>
<tr><td><strong>Wicket</strong></td><td>The bowler's ability to create dismissals.</td><td>Use high-wicket bowlers when you need breakthroughs, especially with attacking fields.</td></tr>
<tr><td><strong>Economy</strong></td><td>The bowler's ability to suppress scoring.</td><td>Useful in middle overs, when defending totals, and when a batter is trying to launch.</td></tr>
<tr><td><strong>Discipline</strong></td><td>Consistency and ability to avoid loose balls, wides and no-balls.</td><td>Especially important at the death, where one bad over can ruin 45 good ones.</td></tr>
<tr><td><strong>Move / Turn</strong></td><td>Movement for seamers, grip and turn for spinners.</td><td>More valuable when conditions support the bowler's type.</td></tr>
<tr><td><strong>Variation</strong></td><td>Deception: cutters, wrong'uns, slower balls and changes of pace.</td><td>Useful against set batters and at the death, especially on slower surfaces.</td></tr>
<tr><td><strong>Stamina</strong></td><td>How well a player resists tiredness.</td><td>Crucial for fast bowlers, all-rounders, keepers, captains and top-order batters.</td></tr>
</tbody></table>
<h4>Fielding and Keeping Skills</h4>
<table><thead><tr><th>Skill</th><th>What it Means</th><th>Manager Use</th></tr></thead><tbody>
<tr><td><strong>Fielding</strong></td><td>Ground fielding, run-saving and involvement in chances.</td><td>Strong fielding quietly saves runs and creates pressure.</td></tr>
<tr><td><strong>Catching</strong></td><td>Chance conversion when catches are offered.</td><td>Bad catching turns good bowling into scorecard misery.</td></tr>
<tr><td><strong>Keeping</strong></td><td>Wicketkeeper quality behind the stumps.</td><td>Affects catches, byes and general keeping reliability.</td></tr>
<tr><td><strong>Stumping</strong></td><td>Ability to complete stumping chances.</td><td>Especially useful with spinners and batters advancing down the pitch.</td></tr>
</tbody></table>
<div class="manual-tip"><strong>Manager tip:</strong> Batting is not one skill and bowling is not one skill. A power hitter with poor rotation can look brilliant on flat decks and awful on slow ones. A wicket-taking bowler with poor economy can win you matches or lose them spectacularly.</div>
<hr>
<h3 id="roles">Roles and Bowling Types</h3>
<p>Roles are a guide to how a player is best used. You are free to be creative, but cricket usually punishes creativity when it is actually just confusion wearing a hat.</p>
<h4>Batting Roles</h4>
<table><thead><tr><th>Role</th><th>Best Used For</th></tr></thead><tbody>
<tr><td><strong>Opener</strong></td><td>Facing the new ball. Needs vs Pace, temperament and enough rotation to avoid being pinned down.</td></tr>
<tr><td><strong>Top Order Batter</strong></td><td>Building the innings. Usually one of your best pure batters.</td></tr>
<tr><td><strong>Middle Order Batter</strong></td><td>Rebuilding after wickets or accelerating after a platform.</td></tr>
<tr><td><strong>Finisher</strong></td><td>Late-overs scoring. Power, temperament and death-over suitability matter.</td></tr>
<tr><td><strong>Wicketkeeper</strong></td><td>Keeps wicket and ideally contributes with the bat. The keeper cannot be an afterthought.</td></tr>
<tr><td><strong>All-rounder</strong></td><td>Balances the XI by providing both batting depth and bowling overs.</td></tr>
</tbody></table>
<h4>Bowling Types</h4>
<table><thead><tr><th>Type</th><th>How They Play</th><th>Best Conditions</th></tr></thead><tbody>
<tr><td><strong>Fast</strong></td><td>High pace, bounce and new-ball threat.</td><td>Green, overcast, humid, misty, hard new-ball phases.</td></tr>
<tr><td><strong>Fast-Medium</strong></td><td>Balanced seam option with useful new-ball and middle-over value.</td><td>Most conditions, especially green or overcast.</td></tr>
<tr><td><strong>Medium</strong></td><td>Control, subtle movement and conditions-based usefulness.</td><td>Two-paced, slow, overcast or disciplined middle-over spells.</td></tr>
<tr><td><strong>Finger Spin</strong></td><td>Control, grip and pressure.</td><td>Dry, slow, cracked, older-ball periods.</td></tr>
<tr><td><strong>Wrist Spin</strong></td><td>Higher wicket threat, more variation, usually more risk.</td><td>Dry, cracked and middle-over attacking spells.</td></tr>
<tr><td><strong>Part-Time Bowling</strong></td><td>Emergency overs from non-specialists.</td><td>Use carefully. A part-timer can save a plan or donate momentum.</td></tr>
</tbody></table>
<p>Pace bowlers are generally most dangerous when the ball is new. Spinners usually become more influential as the ball ages, especially when the pitch is dry or wearing. A balanced attack is helpful, but the best attack is the one that suits the match in front of you.</p>
<div class="manual-tip"><strong>Manager tip:</strong> Five bowlers is the minimum plan. Six bowling options is comfort. Seven is luxury. Four and a part-timer pretending to be a strategy is how scorecards become educational.</div>
<hr>
<h3 id="talents">Talents</h3>
<p>Talents give players personality and tactical identity. Some talents are always active. Others trigger only in the right situation. A talent is not a magic button, but it can turn a good selection into the right selection.</p>
<h4>Batting Talents</h4>
<table><thead><tr><th>Talent</th><th>What it Does</th><th>How to Use It</th></tr></thead><tbody>
<tr><td><strong>Fast Starter</strong></td><td>Reduces the penalty when a batter is new at the crease.</td><td>Useful for openers and aggressive middle-order players.</td></tr>
<tr><td><strong>Anchor</strong></td><td>Helps a batter resist dismissal while the innings is under control.</td><td>Useful at number 3 or 4, especially in chases.</td></tr>
<tr><td><strong>Finisher</strong></td><td>Adds late-innings boundary threat.</td><td>Best at 5-7, not wasted opening unless the player is otherwise elite.</td></tr>
<tr><td><strong>Six Machine</strong></td><td>Improves six-hitting when attacking or launching.</td><td>Use on flat decks, in chases, or against weaker death bowling.</td></tr>
<tr><td><strong>Busy Runner</strong></td><td>Increases singles and twos.</td><td>Very useful on slow, windy or difficult pitches.</td></tr>
<tr><td><strong>Spin Killer</strong></td><td>Improves performance against spin.</td><td>Promote against spin-heavy attacks or dry pitches.</td></tr>
<tr><td><strong>Pace Hunter</strong></td><td>Improves performance against pace.</td><td>Useful against new-ball-heavy seam attacks.</td></tr>
</tbody></table>
<h4>Bowling Talents</h4>
<table><thead><tr><th>Talent</th><th>What it Does</th><th>How to Use It</th></tr></thead><tbody>
<tr><td><strong>New Ball Specialist</strong></td><td>Boosts threat while the ball is new.</td><td>Open the bowling with this player if conditions help seam.</td></tr>
<tr><td><strong>Death Specialist</strong></td><td>Improves containment late in the innings.</td><td>Save overs for 41-50 if stamina allows.</td></tr>
<tr><td><strong>Partnership Breaker</strong></td><td>Gains extra threat once a stand is established.</td><td>Use when two batters are set and the innings is drifting away.</td></tr>
<tr><td><strong>Bouncer</strong></td><td>Fast or fast-medium bowler hurries batters with pace and bounce.</td><td>Useful against pace-vulnerable batters and on lively pitches.</td></tr>
<tr><td><strong>Miser</strong></td><td>Creates more dot-ball pressure.</td><td>Useful when defending, squeezing the middle overs or forcing mistakes.</td></tr>
<tr><td><strong>Golden Arm</strong></td><td>Extra bite early in a spell.</td><td>Use in short attacking bursts rather than endless tired spells.</td></tr>
<tr><td><strong>Mystery Ball</strong></td><td>Spinner becomes dangerous before batters settle against them.</td><td>Useful as a surprise option after the powerplay or against new batters.</td></tr>
</tbody></table>
<h4>Fielding Talents</h4>
<table><thead><tr><th>Talent</th><th>What it Does</th><th>How to Use It</th></tr></thead><tbody>
<tr><td><strong>Safe Hands</strong></td><td>Drops fewer catches.</td><td>Valuable in any XI, especially with attacking bowlers.</td></tr>
<tr><td><strong>Rocket Arm</strong></td><td>More involved in run-out chances.</td><td>Useful in tight chases and against busy runners.</td></tr>
<tr><td><strong>Lightning Hands</strong></td><td>Keeper reacts sharply behind the stumps.</td><td>Excellent with spinners and chance-heavy attacks.</td></tr>
</tbody></table>
<div class="manual-tip"><strong>Manager tip:</strong> Talents should break selection ties. If two batters are similar, the one with Spin Killer is the better pick on a dry pitch. The one with Finisher is the better pick when your lower order keeps dying quietly at the death.</div>
<hr>
<h3 id="pitch-weather">Pitch and Weather</h3>
<p>Conditions matter. The same XI can look dominant one week and confused the next because the match has moved from a flat road to a cracked spinner's surface.</p>
<h4>Pitch Types</h4>
<table><thead><tr><th>Pitch</th><th>Effect</th><th>Manager Advice</th></tr></thead><tbody>
<tr><td><strong>Balanced</strong></td><td>Neutral surface with no major bias.</td><td>Pick your best balanced XI. Skill and tactics decide more than conditions.</td></tr>
<tr><td><strong>Flat</strong></td><td>Scoring rises, wickets fall.</td><td>Batting depth, power and death bowling become crucial.</td></tr>
<tr><td><strong>Green</strong></td><td>Seamers get help, especially early.</td><td>Pick pace, respect the new ball, and consider bowling first.</td></tr>
<tr><td><strong>Dry</strong></td><td>Spin grips, especially as the innings develops.</td><td>Use spinners, pick batters with vs Spin, and avoid a tail that cannot rotate.</td></tr>
<tr><td><strong>Slow</strong></td><td>Boundaries are harder; dots increase.</td><td>Rotation and temperament matter. Variation bowlers can thrive.</td></tr>
<tr><td><strong>Cracked</strong></td><td>Variable bounce creates wickets and ugly scoring.</td><td>Pick wicket-takers and composed batters. Expect chaos.</td></tr>
<tr><td><strong>Two-Paced</strong></td><td>Timing is difficult; false shots rise.</td><td>Control bowlers, variation, rotation and patience are valuable.</td></tr>
</tbody></table>
<h4>Weather</h4>
<table><thead><tr><th>Weather</th><th>Effect</th><th>Manager Advice</th></tr></thead><tbody>
<tr><td><strong>Sunny</strong></td><td>Neutral baseline.</td><td>Pick for pitch and opponent.</td></tr>
<tr><td><strong>Overcast</strong></td><td>Seamers move the ball; crisp boundaries become slightly harder.</td><td>New-ball pace is valuable. Top-order vs Pace matters.</td></tr>
<tr><td><strong>Humid</strong></td><td>New-ball swing threat rises early.</td><td>Open with seam. Do not expose fragile batters early if avoidable.</td></tr>
<tr><td><strong>Hot</strong></td><td>Batting becomes slightly easier and quicker.</td><td>Expect runs. Save reliable death bowling.</td></tr>
<tr><td><strong>Scorching</strong></td><td>Extreme batting conditions; boundaries flow and dismissals dip.</td><td>Pick batting depth and do not panic if par is high.</td></tr>
<tr><td><strong>Drizzle</strong></td><td>Slow wet outfield; fours decrease, dots rise.</td><td>Rotation and disciplined bowling matter more than raw power.</td></tr>
<tr><td><strong>Windy</strong></td><td>Six-hitting is less certain; twos become more useful.</td><td>Busy runners and accumulators gain value.</td></tr>
<tr><td><strong>Chilly</strong></td><td>Boundaries are harder and catching becomes less reliable.</td><td>Safe Hands and strong fielding help prevent painful drops.</td></tr>
<tr><td><strong>Misty</strong></td><td>Early movement and riskier catching.</td><td>Use seamers early, but expect the odd chance to go down.</td></tr>
<tr><td><strong>Dew Later</strong></td><td>Chasing side benefits; wet ball hurts spin in the second innings.</td><td>Think carefully at the toss. Spin-heavy attacks may prefer bowling first.</td></tr>
</tbody></table>
<div class="manual-tip"><strong>Manager tip:</strong> Conditions do not pick your XI for you. They tell you which tradeoffs matter. A green pitch does not make a poor seamer good, but it can make a reliable seamer more valuable than a tired spinner.</div>
<hr>
<h3 id="orders">Match Orders</h3>
<p>The Orders page is where managers win or lose before a ball is bowled. You select the XI, arrange the batting order, choose captain and keeper, decide your toss plan, and map the bowling innings.</p>
<h4>Picking the XI</h4>
<p>A legal XI needs eleven players, a wicketkeeper, a captain, and enough bowling to complete 50 overs. In practice, you want:</p>
<ul><li>at least six players who can bat,</li><li>five real bowling options,</li><li>one competent wicketkeeper,</li><li>a captain with decent leadership,</li><li>enough stamina to survive a full match,</li><li>fielding that will not turn chances into trauma.</li></ul>
<h4>Batting Order</h4>
<p>The batting order is not just "best to worst." It is a plan for phases.</p>
<table><thead><tr><th>Positions</th><th>Job</th></tr></thead><tbody>
<tr><td><strong>1-2</strong></td><td>Face the new ball. Need vs Pace, temperament and preferably Fast Starter or strong rotation.</td></tr>
<tr><td><strong>3</strong></td><td>Usually your stabilizer. Comes in early often enough to matter.</td></tr>
<tr><td><strong>4-5</strong></td><td>Middle-order core. Must rebuild or accelerate depending on match state.</td></tr>
<tr><td><strong>6-7</strong></td><td>Finishers, keeper-batters or all-rounders. Power and temperament are useful.</td></tr>
<tr><td><strong>8-11</strong></td><td>Tail. Any batting here is a bonus, but a strong tail can win ugly games.</td></tr>
</tbody></table>
<h4>Captain</h4>
<p>Your captain provides a small, always-on tactical effect. A good captain helps the side squeeze dots in the field and stay steadier with the bat. Captaincy is deliberately not a superhero mechanic. A legendary captain might be worth a handful of runs, not 80.</p>
<h4>Wicketkeeper</h4>
<p>The keeper takes a larger share of catches and is responsible for stumping chances. Picking a weak keeper to squeeze in another batter can work, right until your spinner creates three chances and your keeper treats them as suggestions.</p>
<h4>Toss Plan</h4>
<p>Your toss plan decides whether you prefer to bat or bowl if you win the toss. Consider:</p>
<ul><li>Does the pitch get harder to bat on?</li><li>Does dew later help the chasing side?</li><li>Is there early seam movement?</li><li>Is your batting better at setting or chasing?</li><li>Are your bowlers fresh enough to exploit the first innings?</li></ul>
<h4>Bowling Plan</h4>
<p>Bowling is planned from two ends. One end bowls the odd overs, the other bowls the even overs. No bowler may bowl consecutive overs, and no bowler may exceed 10 overs in a 50-over innings.</p>
<p>The overs map shows exactly who is scheduled to bowl each over. Use it. If your best death bowler has already bowled out by over 33, the map tried to warn you.</p>
<h4>Presets and Suggestions</h4>
<p>Suggested lineups and bowling presets are useful starting points. They create legal plans quickly and stop new managers from doing anything too strange. They do not fully understand your opponent, your fatigue situation, your long-term season plan, or your desire to destroy a spin-weak batting lineup on a dry pitch.</p>
<div class="manual-tip"><strong>Manager tip:</strong> A good bowling plan has phases: new-ball threat, middle-over control, partnership-breaking options, and death overs. Do not spend all your best overs before the match has revealed what kind of match it is.</div>
<hr>
<h3 id="live-viewer">Live Match Viewer</h3>
<p>The Live Match Viewer lets you follow the match ball by ball. You can play hands-on, simulate one ball, simulate a whole over, simulate an innings, or simulate the full match.</p>
<h4>Batting</h4>
<p>Batting intent is set before the match on the Orders page, phase by phase. More aggressive batting increases scoring potential but also increases risk. Defensive batting protects wickets but can leave too much work for later. Normal intent balances both.</p>
<p>The match situation can soften your orders. A batter told to attack at 40/4 may still show some survival instinct. A defensive batter at 250/4 in the 42nd over may understand that now is not the time to admire forward defensives.</p>
<h4>Bowling</h4>
<p>Bowler spells and field settings are planned before the match. Attacking fields increase wicket-taking chances but can leak runs. Defensive fields restrict scoring but may reduce dismissal pressure. The right choice depends on batter, over, target, pitch, weather and fatigue.</p>
<h4>Partnership Bar</h4>
<p>The partnership bar shows how much damage the current pair is doing. Big partnerships change match state. They also activate certain tactical decisions and talents, especially bowlers designed to break stands.</p>
<h4>Strength Meters</h4>
<p>The batter and bowler strength meters summarize the current matchup. They are normalized views of the engine's live ingredients: skill, matchup, form, fatigue, pitch, weather, phase, pressure, field, intent and talents.</p>
<p>A batter who looked stronger ten overs ago may now be tired. A bowler who looked ordinary with the old ball may become dangerous when conditions suit him. Watch the meters, but read the match.</p>
<h4>Fatigue Notifications</h4>
<p>Players tire during the match. Long batting innings dull a batter's edge. Long bowling spells reduce a bowler's threat and control. You will see fatigue indicators and notifications when tiredness begins to matter.</p>
<div class="manual-tip"><strong>Manager tip:</strong> Drinks breaks and innings breaks restore some energy. Planning spells around recovery windows is a real edge, especially for fast bowlers and all-rounders.</div>
<hr>
<h3 id="engine">Match Engine</h3>
<p>The match engine is probabilistic. That means every ball has a set of possible outcomes, and the engine samples one outcome after adjusting the odds.</p>
<p>Each delivery begins with base one-day cricket odds for the current phase of the innings. The engine then adjusts those odds using:</p>
<ul><li>batter skill,</li><li>bowler threat and control,</li><li>pace/spin matchup,</li><li>batter set-ness,</li><li>batting intent,</li><li>field setting,</li><li>match pressure,</li><li>innings phase,</li><li>pitch,</li><li>weather,</li><li>form,</li><li>fatigue,</li><li>talents,</li><li>fielding and catching quality.</li></ul>
<p>The adjusted probabilities are normalized, and one result is sampled. This is why good teams usually beat bad teams, but not always. It is also why collapses, death-over surges and unlikely partnerships can happen without being scripted.</p>
<h4>Wickets</h4>
<p>Wickets are influenced by bowler threat, batter skill, match pressure, fatigue, pitch, weather, field, talents and phase. A tired batter is more vulnerable. A new batter is not fully settled. A new ball can help seamers. A dry pitch can help spinners. A reckless chase can make everyone look worse.</p>
<h4>Runs</h4>
<p>Scoring depends on batter scoring skills, bowler control, field setting, phase, pitch, weather and intent. Power helps boundaries. Rotation helps avoid dots. Economy and discipline suppress scoring.</p>
<h4>Catches and Fielding</h4>
<p>Caught chances are assigned to real fielders. Better catchers take more chances and drop fewer. Good fielding saves runs and creates pressure; bad fielding turns scorecards into arguments.</p>
<h4>Advanced Engine View</h4>
<p>Player pages may show advanced engine values. These are the raw numbers used by the engine, such as batting aggregate, bowler threat, bowler control and matchup-specific values. They are provided for managers who want to inspect the machinery, not because you need a spreadsheet to enjoy cricket.</p>
<div class="manual-tip"><strong>Manager tip:</strong> Skill shifts odds. It does not guarantee outcomes. If your legendary batter edges behind first ball, it was unlikely, not impossible. Cricket has been doing this to managers for a long time.</div>
<hr>
<h3 id="form-fatigue">Form and Fatigue</h3>
<p>Players are not static objects. They have form, fatigue and workload. Ignoring this is one of the easiest ways to turn a strong squad into a tired one.</p>
<h4>Form</h4>
<p>Form is a short-term confidence and rhythm indicator. It runs:</p>
<p><strong>abysmal → poor → shaky → steady → good → strong → excellent</strong></p>
<p>Good performances lift form. Poor performances lower it. A fifty, hundred, three-for or match-winning spell can help. Cheap dismissals and expensive wicketless spells can hurt.</p>
<p>Form creates a modest adjustment. It matters, but it does not replace skill. An excellent-form ordinary batter is still not secretly world class.</p>
<h4>Between-Match Fatigue</h4>
<p>Heavy match workloads can leave players tired for the next fixture. Bowling long spells, batting deep into an innings, keeping, captaining and playing repeated matches all contribute.</p>
<p>A tired player performs below his visible skills. High stamina helps players recover and reduces the impact of heavy workloads.</p>
<h4>In-Match Fatigue</h4>
<p>Players also tire during a match.</p>
<ul><li>Batters tire as their innings gets longer.</li><li>Bowlers tire through spells and repeated overs.</li><li>Keepers and captains carry extra responsibility.</li><li>Fielders lose sharpness as the match wears on.</li></ul>
<p>Fatigue reduces performance. Tired batters are more vulnerable and score less cleanly. Tired bowlers lose threat and control. Tired fielders and keepers are more likely to miss chances.</p>
<h4>Recovery During Matches</h4>
<p>Players partially recover at drinks breaks and more substantially at the innings break. This makes spell management important. A fast bowler used hard for six overs at the start may return later, but a bowler flogged endlessly will not be the same player at the death.</p>
<div class="manual-tip"><strong>Manager tip:</strong> Rest is a tactic. A fresh reliable bowler can outperform a tired expert when the match is tight.</div>
<hr>
<h3 id="training">Training</h3>
<p>Training is how your squad improves. Each completed round applies training to players based on their selected focus.</p>
<h4>Training Focus</h4>
<p>On the Squad page, assign a training focus to each player. Training improves the selected skill and updates the player's derived values and rating.</p>
<p>You can train strengths to create stars or train weaknesses to make players more balanced. Both approaches are valid. A pure death bowler may need discipline. A young batter with power may need rotation. A keeper who can bat may become far more valuable than a specialist who cannot.</p>
<h4>AI Training</h4>
<p>Other clubs train too. Standing still is not neutral; it is falling behind slowly enough that you may not notice until the table does.</p>
<div class="manual-tip"><strong>Manager tip:</strong> Do not train every player as if they are the same. Decide what role the player is meant to fill, then train toward that role.</div>
<hr>
<h3 id="nets">The Nets</h3>
<p>The Nets are your tactical laboratory. Pick any batter, any bowler, and any conditions, then simulate 10 to 1000 balls.</p>
<p>Use the Nets to answer questions before match day:</p>
<ul><li>Can this batter handle wrist spin on a dry pitch?</li><li>Is my death bowler actually good at the death?</li><li>Does windy weather hurt my power-heavy lineup?</li><li>Is this part-timer safe for four overs?</li><li>Which bowler gives me the best chance against their opener?</li></ul>
<p>The Nets show true per-ball odds computed from the same probability distribution used by the match engine. Small samples can still be noisy, but larger samples reveal the underlying matchup.</p>
<div class="manual-tip"><strong>Manager tip:</strong> Use the Nets before finals, cup matches and awkward away fixtures. Guessing is free, but so is testing.</div>
<hr>
<h3 id="ratings">Match Ratings</h3>
<p>After every match, the ratings page compares the two sides across major units. Ratings are diagnostic tools. They tell you where your team was strong or weak, not whether you deserved to win.</p>
<table><thead><tr><th>Rating</th><th>What it Measures</th></tr></thead><tbody>
<tr><td><strong>Top Order</strong></td><td>Batting output and quality from positions 1-3.</td></tr>
<tr><td><strong>Middle Order</strong></td><td>Batting contribution from positions 4-7.</td></tr>
<tr><td><strong>Tail</strong></td><td>Batting value from positions 8-11.</td></tr>
<tr><td><strong>Seam</strong></td><td>Performance of fast, fast-medium and medium bowlers.</td></tr>
<tr><td><strong>Spin</strong></td><td>Performance of finger and wrist spinners.</td></tr>
<tr><td><strong>Fielding / Keeping</strong></td><td>Catches, stumpings, run-outs and ground-fielding value.</td></tr>
<tr><td><strong>Overall</strong></td><td>Total team performance across batting, bowling and fielding.</td></tr>
</tbody></table>
<p>The ratings are normalized against one-day cricket expectations and expressed using the same skill-word ladder used elsewhere in the game.</p>
<h4>Reading Ratings Properly</h4>
<p>If you lose but win four rating rows, the match likely turned on a specific failure: tail collapse, death bowling, dropped catches, or a top-order failure. If you win while losing most rows, you may have had a decisive player performance or a lucky swing. Enjoy it, then investigate before assuming genius.</p>
<div class="manual-tip"><strong>Manager tip:</strong> Match ratings are how the game teaches you. The result tells you whether you won. Ratings tell you what needs fixing.</div>
<hr>
<h3 id="stats-reports">Scorecards, Reports and Stats</h3>
<p>The match scorecard is the official record of what happened. The report explains how the match unfolded. The stats pages show longer-term trends.</p>
<h4>Scorecard</h4>
<p>The scorecard shows batting, bowling, dismissals, fall of wickets, partnerships and fielding events. Dismissals include the relevant bowler and, where applicable, the catcher or keeper.</p>
<h4>Match Report</h4>
<p>The report gives a narrative summary of the game. It should help you understand:</p>
<ul><li>where the match turned,</li><li>which partnerships mattered,</li><li>which bowlers controlled phases,</li><li>whether fatigue affected performance,</li><li>which unit won the tactical battle.</li></ul>
<h4>Player Stats</h4>
<p>Player pages show career and seasonal information. Batting stats, bowling stats and fielding stats help you see who is actually performing, not just who looks good on the Squad page.</p>
<h4>Fielding Events</h4>
<p>Fielding is tracked because fielding matters. Catches, stumpings, run-outs, drops, misfields and great fielding events can decide matches. A player who saves ten runs and takes two catches may be more valuable than a batter who made a pretty 28.</p>
<hr>
<h3 id="finance">Finances</h3>
<p>A cricket club is not run on vibes. Money matters. Spend too little and your squad stagnates. Spend too much and you will eventually be forced to sell someone you love.</p>
<h4>Income</h4>
<p>Money comes from:</p>
<ul><li>home gate receipts,</li><li>league prize money,</li><li>cup prize money.</li></ul>
<h4>Expenses</h4>
<p>Money goes to:</p>
<ul><li>ground maintenance,</li><li>academy running costs,</li><li>upgrades.</li></ul>
<p>The Office contains the financial ledger. Use it. A club that looks affordable in Week 1 may look irresponsible by Week 12.</p>
<hr>
<h3 id="ground">Home Ground</h3>
<p>Your home ground gives you control over pitch preparation. This is one of the biggest strategic levers in the game. A spin-heavy squad can build around dry pitches. A seam-heavy squad can prepare greener surfaces. A batting-heavy squad may prefer flatter decks and trust its firepower.</p>
<p>The best home pitch is not always the one that helps your best player. It is the one that helps your whole squad more than it helps your opponent.</p>
<h4>Stadium Capacity</h4>
<p>Expanding the stadium increases potential gate receipts, but every seat costs money to maintain. Expanding too early can turn ambition into weekly leakage.</p>
<div class="manual-tip"><strong>Manager tip:</strong> Choose a home identity. If your squad is built around spin, make opponents beat you on your terms.</div>
<hr>
<h3 id="seasons">Competitions, Seasons, Aging and Careers</h3>
<p>A season is an 18-round double round-robin league, with a cup competition alongside the senior campaign.</p>
<h4>League</h4>
<p>League points decide the table. Net run rate separates teams level on points. Winning is the first job. Winning well is the second.</p>
<h4>Senior One Day Cup</h4>
<p>The cup runs alongside the league. Knockout cricket rewards depth, form and timing. A league side can recover from one bad day. A cup side cannot.</p>
<h4>Aging</h4>
<p>At the end of each season, players age. Young players generally train faster. Older players train more slowly. From the early thirties, physical decline begins to matter. Power, stamina and fielding are especially vulnerable with age.</p>
<h4>Retirement</h4>
<p>Older players may retire, and very old players eventually will. Plan succession before the farewell article writes itself.</p>
<div class="manual-tip"><strong>Manager tip:</strong> A perfect squad today can be old tomorrow. Track age structure, not just rating.</div>
<hr>
<h3 id="saving">Saving Your Game</h3>
<p>Fifty Overs autosaves to your browser after completed rounds and reloads automatically when you return.</p>
<p>Browser storage keeps recent match information, including ball-by-ball commentary for recent games. For long-term safety, use the Export function in the Office. Exporting writes a complete save file to disk. Import restores that save elsewhere.</p>
<p>If your browser blocks storage or you move computers, exported saves are your backup system. To start completely fresh, use Reset game in the Office.</p>
<div class="manual-tip"><strong>Manager tip:</strong> Export before major experiments, finals, commissioner rounds or anything you would be annoyed to lose.</div>
<hr>
<h3 id="friends">Friends League / Commissioner Mode</h3>
<p>Fifty Overs supports a file-based friends league. Up to four human managers can control clubs, with the remaining teams run by AI. No server is required.</p>
<h4>Commissioner Setup</h4>
<ol><li>Open the Office.</li><li>Import each founder's club file.</li><li>Start the season.</li><li>Export the league file.</li><li>Share the save file and game link with the managers.</li></ol>
<h4>Daily Loop for Managers</h4>
<ol><li>Import the latest save file.</li><li>Switch to your assigned club.</li><li>Set orders for the upcoming round.</li><li>Export your orders packet.</li><li>Send the packet to the commissioner.</li></ol>
<h4>Daily Loop for Commissioner</h4>
<ol><li>Import all manager order packets.</li><li>Set your own orders if you manage a club.</li><li>Complete the round.</li><li>Export the new save.</li><li>Share it with the managers.</li></ol>
<p>The system is deterministic. Managers can re-import the save and packets to verify the round ball for ball. Packets for the wrong round are rejected.</p>
<hr>
<h3 id="verification">Verifying the Engine</h3>
<p>Fifty Overs is designed to be inspectable. If a match feels strange, there are ways to understand whether it was bad luck, bad tactics, or a real issue.</p>
<h4>1. Use the Nets</h4>
<p>The Nets show true per-ball odds from the same engine used in matches. Run enough balls and the sampled results should approach the listed probabilities.</p>
<h4>2. Read Match Reports and Ratings</h4>
<p>Reports and ratings show whether a result came from top-order failure, bowling imbalance, fielding mistakes, fatigue, pitch mismatch or death-over collapse.</p>
<h4>3. Check Calibration</h4>
<p>The engine is calibrated against modern one-day cricket patterns: phase scoring, wicket rates, dot percentage, boundary rates, dismissal types and score distributions, then tuned toward a 2026-style expectation where par is usually in the 260s rather than the older low-240s ODI baseline.</p>
<h4>4. Replay Determinism</h4>
<p>The same save and same orders produce the same match. This allows commissioner leagues and serious managers to verify results.</p>
<div class="manual-tip"><strong>Manager tip:</strong> "Unlikely" is not the same as "broken." Cricket produces ridiculous scorecards in real life too. The question is whether the odds made sense before the ball was bowled.</div>
<hr>
<h3 id="differences">Differences from FTP</h3>
<p>Fifty Overs is inspired by classic cricket management games, especially the pavilion-style structure of managing a club, training players, setting orders, reading conditions, following matches and building over seasons. It is not a clone of FTP's full online world.</p>
<table><thead><tr><th>Area</th><th>Fifty Overs Approach</th></tr></thead><tbody>
<tr><td><strong>Format</strong></td><td>Focused on 50-over cricket. No T20 or first-class formats are bolted on.</td></tr>
<tr><td><strong>Engine</strong></td><td>Ball-by-ball probabilistic engine calibrated to real ODI data and tuned to 2026-style one-day expectations.</td></tr>
<tr><td><strong>Play Style</strong></td><td>Single-player and local-first, with optional file-based friends league.</td></tr>
<tr><td><strong>Community Systems</strong></td><td>No forums, memberships, affiliates or international management systems.</td></tr>
<tr><td><strong>Transparency</strong></td><td>Nets, ratings, reports, live strength meters and deterministic saves make the engine inspectable.</td></tr>
</tbody></table>
<p>The goal is to capture the tactical cricket-management feeling: squad building, selection headaches, pitch planning, orders, training, finances, aging and the emotional damage of dropping a catch at 247/8.</p>
<hr>
<h3 id="glossary">Stats Glossary</h3>
<table><thead><tr><th>Term</th><th>Meaning</th></tr></thead><tbody>
<tr><td><strong>Runs</strong></td><td>Total runs scored by a batter or team.</td></tr>
<tr><td><strong>Balls</strong></td><td>Legal deliveries faced by a batter.</td></tr>
<tr><td><strong>Average</strong></td><td>Runs per dismissal.</td></tr>
<tr><td><strong>Strike Rate</strong></td><td>Runs per 100 balls faced.</td></tr>
<tr><td><strong>Overs</strong></td><td>Six legal deliveries bowled.</td></tr>
<tr><td><strong>Economy</strong></td><td>Runs conceded per over.</td></tr>
<tr><td><strong>Bowling Average</strong></td><td>Runs conceded per wicket taken.</td></tr>
<tr><td><strong>Bowling Strike Rate</strong></td><td>Balls bowled per wicket taken.</td></tr>
<tr><td><strong>NRR</strong></td><td>Net run rate: scoring rate for minus scoring rate against. All-out innings count as the full 50 overs.</td></tr>
<tr><td><strong>Dots</strong></td><td>Balls from which no run is scored.</td></tr>
<tr><td><strong>Boundary</strong></td><td>A four or six.</td></tr>
<tr><td><strong>Death Overs</strong></td><td>The final 10 overs of a 50-over innings.</td></tr>
<tr><td><strong>Powerplay / New Ball Phase</strong></td><td>The early overs when seamers may receive more help and top-order technique is tested.</td></tr>
<tr><td><strong>Partnership</strong></td><td>Runs added by the current pair of batters.</td></tr>
<tr><td><strong>Form</strong></td><td>Short-term player rhythm based on recent performance.</td></tr>
<tr><td><strong>Fatigue</strong></td><td>Player tiredness, both during matches and between matches.</td></tr>
<tr><td><strong>Rating</strong></td><td>A normalized word-based measure of player or unit quality.</td></tr>
<tr><td><strong>Top Order</strong></td><td>Batting positions 1-3 in match ratings.</td></tr>
<tr><td><strong>Middle Order</strong></td><td>Batting positions 4-7 in match ratings.</td></tr>
<tr><td><strong>Tail</strong></td><td>Batting positions 8-11 in match ratings.</td></tr>
<tr><td><strong>Seam</strong></td><td>Fast, fast-medium and medium bowling.</td></tr>
<tr><td><strong>Spin</strong></td><td>Finger spin and wrist spin bowling.</td></tr>
<tr><td><strong>Fielding Credits</strong></td><td>Catches, stumpings, run-outs and other fielding actions assigned to real players.</td></tr>
</tbody></table>
<hr>
<h3>Final Word</h3>
<p>Fifty Overs rewards managers who think in cricket terms. Do not ask only, "Who has the highest rating?" Ask:</p>
<ul><li>Who survives the new ball today?</li><li>Who scores when boundaries are hard?</li><li>Who bowls when the ball is old?</li><li>Who catches the chance my best bowler creates?</li><li>Who is too tired to trust?</li><li>Who should I train now so I do not have to buy later?</li></ul>
<p>The engine gives you cricket. The squad gives you options. The orders give you control. The rest is management.</p>`;

// Players PEAK AFTER 27 (18 is the floor age). A player's HEADLINE skill and their
// technique stay within ~1-2 word levels (FTP-consistent); a specialist's off-discipline
// stays low so roles keep meaning. quality q in [0,1].
const foExpWordOf=e=>EXPLAD[Math.max(0,Math.min(EXPLAD.length-1,Math.floor((e||0)/9)))];
function foSkillLevel(q,age){                 // returns a (possibly fractional) word-index 0..15
  const peak=Math.max(7,Math.min(15,7+8*Math.pow(q,0.8)));   // age>=27 ceiling
  const young=Math.min(9,3.5+6*Math.pow(q,0.85));            // age 18 value (generational 18yo = expert)
  const frac=Math.max(0,Math.min(1,(age-18)/9));            // reaches peak at 27, plateaus to 30
  return young+(peak-young)*frac;
}
function foGenSkills(role,q,age,rnd){
  const gg=(m,s)=>Math.max(4,Math.min(99,Math.round(m+s*(rnd()+rnd()+rnd()-1.5))));
  const l2s=L=>Math.max(4,Math.min(99,Math.round(L*6.25+3.1+(rnd()-0.5)*3)));
  const lvl=foSkillLevel(q,age), tgt=l2s(lvl);
  const isBowl=['seamFast','seamFastMedium','seamMedium','wristSpin','fingerSpin'].includes(role);
  const isWK=role==='wicketkeeper', isAR=role==='allRounder';
  if(isBowl){        // headline = bowling; batting low (specialist identity)
    return {wicket:gg(tgt,4),economy:gg(tgt-2,4),discipline:gg(tgt-4,6),moveTurn:gg(tgt-3,6),
      variation:gg(tgt-5,6),stamina:gg(tgt-2,6),
      vsPace:gg(20,7),vsSpin:gg(18,7),rotation:gg(20,7),temperament:gg(30,8),power:gg(16,6),
      fielding:gg(50,8),catching:gg(50,8),keeping:gg(8,3),stumping:gg(7,3)};
  }else if(isWK){    // headline = keeping; batting within ~1-2 levels below (keepers bat)
    const bt=l2s(Math.max(4,lvl-1.3));
    return {keeping:gg(tgt,3),stumping:gg(tgt-3,5),catching:gg(tgt-2,5),
      vsPace:gg(bt,5),vsSpin:gg(bt,5),rotation:gg(bt,6),temperament:gg(bt,6),power:gg(bt-8,7),
      wicket:gg(8,3),economy:gg(9,3),discipline:gg(12,4),moveTurn:gg(7,3),variation:gg(7,3),
      stamina:gg(bt-10,7),fielding:gg(tgt-4,6)};
  }else if(isAR){    // genuine two-way: bat & bowl both near lvl-1 (bat/bowl/tech all within 1-2 levels)
    const two=l2s(Math.max(4,lvl-1));
    return {vsPace:gg(two,5),vsSpin:gg(two,5),rotation:gg(two-2,6),temperament:gg(two,6),power:gg(two-4,7),
      wicket:gg(two,5),economy:gg(two-2,5),discipline:gg(two-4,6),moveTurn:gg(two-3,6),variation:gg(two-4,6),
      stamina:gg(two,6),fielding:gg(two-6,7),catching:gg(two-4,7),keeping:gg(10,3),stumping:gg(8,3)};
  }else{             // batsman: tight batting cluster so aggBat & technique land within ~1 level
    return {vsPace:gg(tgt,4),vsSpin:gg(tgt,4),rotation:gg(tgt-2,5),temperament:gg(tgt,5),
      power:gg(role==='opener'?tgt-12:tgt-4,7),
      wicket:gg(10,4),economy:gg(11,4),discipline:gg(12,4),moveTurn:gg(9,4),variation:gg(8,4),
      stamina:gg(tgt-14,7),fielding:gg(tgt-8,7),catching:gg(tgt-6,7),keeping:gg(8,3),stumping:gg(6,3)};
  }
}
function foGenExp(age,q,rnd){                  // experience correlates with age (0-100 scale)
  const base=(age-17)*6.5+q*8;
  return Math.max(2,Math.min(99,Math.round(base+(rnd()+rnd()+rnd()-1.5)*11)));
}
function jsDerive(p){ // mirror of world-gen engine mapping
  const sk=p.skills;
  p.bat=Math.round(.32*sk.vsPace+.32*sk.vsSpin+.16*sk.rotation+.20*sk.temperament);
  p.power=sk.power;p.rotation=sk.rotation;p.temperament=sk.temperament;p.vsPace=sk.vsPace;p.vsSpin=sk.vsSpin;
  const ENGT={'seamFast':'fast','seamFastMedium':'fastMedium','seamMedium':'medium','wristSpin':'wristSpin','fingerSpin':'fingerSpin','partTimeSeam':'medium','partTimeSpin':'offSpin'};
  p.bowlType=p.bowlTypeFull==='none'?null:ENGT[p.bowlTypeFull];
  p.threat=p.bowlType?sk.wicket:0;p.control=p.bowlType?sk.economy:0;p.bowl=p.bowlType?Math.round((p.threat+p.control)/2):0;
  p.field=sk.fielding;p.keeper=(p.role==='wicketkeeper');p.keeping=sk.keeping;
  const arm=p.hand==='R'?'Right arm':'Left arm';
  const lbl={'seamFast':'fast','seamFastMedium':'fast medium','seamMedium':'medium','wristSpin':'wrist spin','fingerSpin':'finger spin','partTimeSeam':'part-time seam','partTimeSpin':'part-time spin'};
  p.btLabel=p.bowlTypeFull==='none'?'Does not bowl':arm+' '+lbl[p.bowlTypeFull];
  // v11.6: FTP-scaled rating (~15x the old bracket sum) so drafted/edited players match the baked FTP squads.
  p.rating=Math.round(420*(p.bat+sk.power*0.4+(p.threat+p.control)*0.5+sk.fielding*0.3+(p.role==='wicketkeeper'?sk.keeping*0.3:0)));
  p.wage=Math.round(200+p.rating*0.037);   // keeps wages in the existing ~1600-3200 economy band
}

function runNets(batP,bowlP,n,opt){ // exposed for audit
  const r=rng(opt.seed>>>0);const counts={};let runs=0,legal=0,wkts=0;
  const ph=opt.over<10?'pp':(opt.over>=40?'death':'mid');
  for(let i=0;i<n;i++){
    const d=ballDist(batP,bowlP,ph,opt.faced,opt.intent,0,opt.pitch,opt.field,opt.over,{weather:(opt.weather||'sunny').toLowerCase(),pship:0,chase:false,bballs:12});
    const x=r();let c=0,out='dot';
    for(const k in d){c+=d[k];if(x<=c){out=k;break}}
    counts[out]=(counts[out]||0)+1;
    if(['1','2','3'].includes(out))runs+=+out;
    else if(out==='4')runs+=4;else if(out==='6')runs+=6;
    else if(['wide','noball','bye','legbye'].includes(out))runs+=1;
    if(out!=='wide'&&out!=='noball')legal++;
    if(isWkt(out))wkts++;
  }
  return{counts,runs,legal,wkts,n};
}
function netsSel(kind){

        expected SR ${(100*eSR).toFixed(1)} &nbsp;·&nbsp; dismissal ${(100*pW).toFixed(2)}%/ball (1 in ${(1/Math.max(1e-6,pW)).toFixed(0)})<br>
        dot ${(100*pDot).toFixed(1)}% &nbsp;·&nbsp; boundary ${(100*pB).toFixed(1)}%</div>

  }

  const EXPW=['atrocious','dreadful','poor','ordinary','average','reasonable','capable','reliable','accomplished','expert','spectacular','elite'];
  const used=new Set();
  const g=(m,s)=>Math.max(5,Math.min(96,Math.round(m+s*(rnd()+rnd()+rnd()-1.5))));
  // ---- squad composition: 42 players, role-balanced, all-rounders deliberately capped ----
  // ---- SCARCITY-BANDED DRAFT: few elites, hard cliffs, long journeyman tail ----
  // Tier multipliers with GAPS between bands so missing a tier is a real loss, not one rung.
  const TIER={franchise:1.62,star:1.30,solid:0.98,journeyman:0.70,project:0.52};
  // Per-role tier budgets. Deliberately scarce at the top: in a 4-founder league someone
  // WILL be frozen out of every premium position. Batting is the deepest; keepers the thinnest.
  const roleBands={
    bat:   ['franchise','franchise','star','star','star','solid','solid','solid','solid','journeyman','journeyman','journeyman','project','project'],
    wk:    ['star','solid','journeyman','journeyman','project'],                 // ONE good keeper. That's it.
    ar:    ['star','solid','solid','journeyman','journeyman','project'],         // no franchise all-rounders - specialists define the top
    pace:  ['franchise','star','star','solid','solid','journeyman','journeyman','project','project'],
    spin:  ['franchise','star','solid','solid','journeyman','journeyman','project','project','project']
  };
  const plan=[];
  const pushBand=(role,tiers)=>tiers.forEach(t=>plan.push({role,tier:t}));
  // batting: mix of openers/top/middle across the 14 bat slots
  const batRoles=['opener','opener','topOrderBat','topOrderBat','topOrderBat','middleOrderBat','middleOrderBat','middleOrderBat','middleOrderBat','opener','topOrderBat','middleOrderBat','middleOrderBat','opener'];
  roleBands.bat.forEach((t,i)=>plan.push({role:batRoles[i%batRoles.length],tier:t}));
  pushBand('wicketkeeper',roleBands.wk);
  pushBand('allRounder',roleBands.ar);
  // Scarcity ladder (same tier multiset as before, but bowl types are no longer evenly cycled):
  // PACE (9): exactly ONE genuine fast bowler per pool - and he's the franchise pace asset.
  //   Fast > FastMedium > Medium in rarity: 1 fast, 3 fast-medium, 5 medium.
  // SPIN (9): wrist spin is the scarce, top-heavy craft: 3 wrist (franchise/star/flier), 6 finger.
  [ {r:'seamFast',t:'franchise'},
    {r:'seamFastMedium',t:'star'},{r:'seamFastMedium',t:'solid'},{r:'seamFastMedium',t:'journeyman'},
    {r:'seamMedium',t:'star'},{r:'seamMedium',t:'solid'},{r:'seamMedium',t:'journeyman'},{r:'seamMedium',t:'project'},{r:'seamMedium',t:'project'}
  ].forEach(s=>plan.push({role:s.r,tier:s.t}));
  [ {r:'wristSpin',t:'franchise'},{r:'wristSpin',t:'star'},{r:'wristSpin',t:'journeyman'},
    {r:'fingerSpin',t:'solid'},{r:'fingerSpin',t:'solid'},{r:'fingerSpin',t:'journeyman'},{r:'fingerSpin',t:'project'},{r:'fingerSpin',t:'project'},{r:'fingerSpin',t:'project'}
  ].forEach(s=>plan.push({role:s.r,tier:s.t}));
  const pool=[];
  for(const slot of plan){
    const role=slot.role;
    const isB=['seamFast','seamFastMedium','seamMedium','wristSpin','fingerSpin'].includes(role);
    const isWK=role==='wicketkeeper';
    const isAR=role==='allRounder';
    const isBat=!isB&&!isWK&&!isAR;
    // quality q in [0,1] from the tier band (+ per-player noise), then AGE x QUALITY skills.
    const tierMult=(TIER[slot.tier]||0.9);
    const q=Math.max(0.05,Math.min(0.99,(tierMult-0.45)/1.25+(rnd()-0.5)*0.16));
    // Age: 18 (floor) .. 30 (oldest), weighted toward mid-20s so peak-age players exist.
    const age=Math.max(18,Math.min(30,18+Math.floor((rnd()+rnd())*6.5)));
    const skills=foGenSkills(role,q,age,rnd);
    const exp=foGenExp(age,q,rnd);
    const nat=NAT[Math.floor(rnd()*NAT.length)];
    const nm=natName(nat,rnd,used);used.add(nm);
    const p={name:nm,age,nat,hand:rnd()<0.72?'R':'L',role,
      bowlTypeFull:(isB?role:(isAR?(rnd()<0.5?'seamMedium':'fingerSpin'):'none')),keeper:isWK,
      exp,expWord:foExpWordOf(exp),capt:g(45,16),formIx:3,fatigue:'rested',skills,talents:[]};
    // talents: specialists get specialty-fitting ones; capped so they read as flavor not noise
    const elig=Object.keys(TALN).filter(t=>{
      if(t==='lightningHands')return isWK;
      if(t==='bouncer')return ['seamFast','seamFastMedium'].includes(p.bowlTypeFull);
      if(t==='mysteryBall')return ['wristSpin','fingerSpin'].includes(p.bowlTypeFull);
      if(['newBallSpecialist','deathSpecialist','miser','goldenArm','partnershipBreaker'].includes(t))return isB||isAR;
      // batting talents gated to the batting SITUATION they fit
      if(t==='fastStarter')return role==='opener';                          // new-ball aggressor
      if(t==='anchor')return role==='opener'||role==='topOrderBat';         // builds the innings
      if(t==='finisher')return role==='middleOrderBat'||isAR;               // death hitter, never an opener
      if(t==='sixMachine')return role==='middleOrderBat'||isAR||isWK;       // lower-order power
      if(t==='busyRunner')return isBat||isAR||isWK;
      if(t==='spinKiller'||t==='paceHunter')return isBat||isAR||isWK;
      return true});
    const nT=tierMult>1.1?(rnd()<0.6?2:1):(rnd()<0.5?1:0);
    for(let k=0;k<nT&&elig.length;k++){const t=elig.splice(Math.floor(rnd()*elig.length),1)[0];p.talents.push(t)}
    jsDerive(p);
    p.wage=Math.max(700,Math.round((p.rating*0.045+p.talents.length*120)/10)*10);
    pool.push(p);
  }
  // ---- PRICING: 5-8 superstars affordable, the rest fillers, and no squad can be elite everywhere ----
  const rcls=p=>p.keeper?'wk':(p.role==='allRounder'?'ar':(p.bowlTypeFull!=='none'?'bowl':'bat'));
  const specialty=p=>{
    const bat=aggBat(p),bowl=p.bowlType?aggBowl(p):0,keep=p.skills.keeping;
    const cls=rcls(p);
    if(cls==='bat')return bat+0.15*p.skills.power;
    if(cls==='bowl')return bowl+0.10*bat;
    if(cls==='wk')return 0.62*keep+0.55*bat;
    return 0.9*Math.max(bat,bowl)+0.35*Math.min(bat,bowl)+3;
  };
  pool.forEach(p=>{p._raw=specialty(p);p._cls=rcls(p)});
  // within-role percentile (cross-role normalized), then map to three price bands with gaps:
  // superstar $105k-$160k · mid $38k-$62k · filler $14k-$24k
  const groups={};for(const p of pool)(groups[p._cls]=groups[p._cls]||[]).push(p);
  for(const cls in groups){
    const arr=groups[cls].sort((a,b)=>a._raw-b._raw);const m=arr.length;
    arr.forEach((p,i)=>{p._pct=m>1?i/(m-1):0.5});
  }
  pool.forEach(p=>{
    let band, t;
    const pct=p._pct*(p._cls==='ar'?0.92:1);
    if(pct>=0.72){band='star';t=(pct-0.72)/0.28}
    else if(pct>=0.42){band='mid';t=(pct-0.42)/0.30}
    else{band='filler';t=pct/0.42}
    p.band=band;
    const f=band==='star'?105000+t*55000:band==='mid'?38000+t*24000:14000+t*10000;
    // Scarcity premium: genuine pace is the rarest commodity in the game, wrist spin the rarest spin.
    // You pay for what you can't find elsewhere - over and above raw skill.
    const scar=p.bowlTypeFull==='seamFast'?1.35:(p.bowlTypeFull==='wristSpin'?1.15:1);
    p.fee=Math.round(f*scar/1000)*1000;
    p.wage=Math.max(700,Math.round((p.rating*0.045*scar+(p.talents?p.talents.length:0)*120)/10)*10);
  });
  return pool;
}

function money(n){return '$'+Math.round(n||0).toLocaleString()}

function safeName(s){return String(s||'').replace(/'/g,'&#39;').replace(/"/g,'&quot;')}

pgFounder=function(){
  const F=App.founder;if(!F||!F.pool){founderStart();return}
  App._draftSort=App._draftSort||'fee';App._draftRole=App._draftRole||'all';
  const spent=founderSpent(),left=F.budget-spent;
  const roleClass=p=>p.keeper?'wk':(p.role==='allRounder'?'ar':(p.bowlTypeFull&&p.bowlTypeFull!=='none'?'bowl':'bat'));

  const keyf={fee:p=>-p.fee,rating:p=>-p.rating,bat:p=>-aggBat(p),bowl:p=>-(p.bowlType?aggBowl(p):0),power:p=>-p.skills.power,field:p=>-aggField(p),keep:p=>-p.skills.keeping,age:p=>p.age}[App._draftSort]||(p=>-p.fee);
  list=list.slice().sort((a,b)=>keyf(a)-keyf(b));
  const c=founderCounts(); const bowlOptions=F.picked.filter(p=>p.bowlTypeFull&&p.bowlTypeFull!=='none').length;
  const rf=(t,lbl)=>`<button class="chip ${App._draftRole===t?'on':''}" onclick="App._draftRole='${t}';App._draftSub='all';pgFounder()">${lbl}</button>`;

S.played[fixtureKey(r,f)];let res;if(pIx!==undefined){const R=App.results[pIx];res=`<td>${esc(R.result.text)}</td><td><a href="#/scorecard?i=${pIx}">sc</a></td><td><a href="#/reports?i=${pIx}">rpt</a></td><td><button onclick="replayMatch(${pIx})">replay</button></td>`;}else{res=`<td class="small">${r<S.round?'—':'not played'}</td><td></td><td></td><td></td>`;}out+=`<tr ${isU?'style="background:#eef4ee"':''}><td>${r+1}</td><td>Lg</td><td>${esc(h.name)}</td><td>${esc(a.name)}</td><td class="small">${esc(h.ground)}</td>${res}</tr>`;}}return out;})();const digest=App._digest||'';App._digest='';const buttons=done?'':`<div class="ctlrow fo-round-actions" style="margin-top:6px"><button ${aiUnplayed?'':'disabled'} onclick="completeAIRound()">Complete AI round</button>${allPlayed?`<button class="primary" onclick="completeRound()">Move to round ${S.round+2}</button>`:userPlayed?`<button class="primary" onclick="completeRound()">Complete round and advance</button>`:`<button class="warn" onclick="if(confirm('Sim your match and all remaining AI fixtures, then advance the round?'))completeRound()">Sim whole round</button>`}</div>`;document.getElementById('page').innerHTML=crumb(t.name,'Matches')+digest+`<div class="grid2"><div class="col"><div class="panel"><h4>🏆 League table - Chat Division 1</h4><div class="pad"><table><tr><th></th><th>Club</th><th class="n">P</th><th class="n">W</th><th class="n">L</th><th class="n">T</th><th class="n">NRR</th><th class="n">Pts</th></tr>${tbl}</table></div></div></div><div class="col"><div class="panel"><h4>${done?'Season '+App.seasonNo+' complete':'Round '+(S.round+1)+' of '+S.schedule.length+' - '+fo55RoundDate(S.round)}</h4><div class="pad">${done?`<div class="oktxt">Season complete.</div><button class="primary" onclick="seasonEnd()">Start season ${App.seasonNo+1}</button>`:`<table><tr><th>Home</th><th>Away</th><th>Ground</th><th></th></tr>${fixRows}</table>${buttons}<div class="small">Complete AI round only plays non-user fixtures. Sim whole round completes everything and advances to the next round.</div>`}</div></div></div></div><div class="panel"><h4>Fixtures &amp; results</h4><div class="pad"><table><tr><th>Date</th><th>Class</th><th>Home</th><th>Away</th><th>Ground</th><th>Result</th><th></th><th></th><th></th></tr>${rows}</table></div></div>`;fo55Sanitize();fo55LiveTopbar()};
