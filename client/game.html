<script>
(function(){
  if(typeof App==='undefined')return;

  /* ---------- helpers ---------- */
  function safe(fn){try{return fn&&fn()}catch(e){console.error('[FO patch] step failed:',e);return undefined}}
  function safeCall(name){try{if(typeof window[name]==='function')window[name]()}catch(e){console.error(e)}}

  /* ---------- 2. role-type icons (bat / ball / both / stumps) ---------- */
  var SVG_BAT ='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M6 18 L15 9"/><path d="M15 9 l3 -3"/><circle cx="8" cy="17" r="1.6" fill="currentColor" stroke="none"/></svg>';
  var SVG_BALL='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="7.5" fill="currentColor" fill-opacity="0.18"/><path d="M8 6.5 C10 10 10 14 8 17.5" /><path d="M16 6.5 C14 10 14 14 16 17.5"/></svg>';
  var SVG_BOTH='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 17 L11 10"/><path d="M11 10 l2 -2"/><circle cx="18" cy="15" r="4" fill="currentColor" fill-opacity="0.2"/><path d="M18 11.5 C16.8 13.5 16.8 16.5 18 18.5"/></svg>';
  var SVG_WK  ='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M7 8 V19"/><path d="M12 8 V19"/><path d="M17 8 V19"/><path d="M6 7 L18 7"/><path d="M6.5 5.5 L11 7"/><path d="M17.5 5.5 L13 7"/></svg>';
  function foRoleClass(p){
    if(!p)return 'bat';
    if(typeof roleClass==='function'){try{return roleClass(p)}catch(e){}}
    if(p.keeper)return 'wk';
    if(p.role==='allRounder')return 'ar';
    return (p.bowlType||p.bowlTypeFull&&p.bowlTypeFull!=='none')?'bowl':'bat';
  }
  window.foRoleIcon=function(p){
    var c=foRoleClass(p);
    var m={bat:['Batsman',SVG_BAT],bowl:['Bowler',SVG_BALL],ar:['All-rounder',SVG_BOTH],wk:['Wicketkeeper',SVG_WK]};
    var e=m[c]||m.bat;
    return '<span class="fo-role-ic fo-ic-'+c+'" title="'+e[0]+'">'+e[1]+'</span>';
  };
  playerLink=function(p){return '<a href="#/player?n='+encodeURIComponent(p.name)+'" title="'+esc(playerTip(p))+'">'+foRoleIcon(p)+esc(p.name)+'</a>'};
  playerMini=function(p){return '<span class="player-hoverable" title="'+esc(playerTip(p))+'">'+foRoleIcon(p)+esc(p.name)+'</span>'};
  if(typeof fo55Flag==='function'){window.fo55Flag=function(){return ''}}

  /* ---------- 6. remove club-dashboard blurb ---------- */
  if(typeof pgClub==='function'){
    var _prevPgClub=pgClub;
    pgClub=function(){
      _prevPgClub();
      var page=document.getElementById('page');
      if(page){page.querySelectorAll('.welcome-hero p').forEach(function(el){
        if(/clean match-day dashboard/i.test(el.textContent))el.remove();
      });}
      safeCall('fo55Sanitize');
    };
  }

  /* ---------- 3 & 7. robust round advancement (never gets stuck) ---------- */
  function foSimMeta(f,roundNo){
    if(typeof fo55SimMeta==='function')return fo55SimMeta(f,roundNo);
    var home=GD.teams[f[0]],away=GD.teams[f[1]];
    return {home:home.name,away:away.name,ground:home.ground,pitch:groundPitch(home.ground),
      weather:WXLIST[(roundNo*7+f[0]*3)%WXLIST.length],seed:5000+roundNo*10+f[0],
      date:(typeof fo55RoundDate==='function'?fo55RoundDate(roundNo):simDate()),comp:'league',round:roundNo,
      isUser:(f[0]===App.teamIx||f[1]===App.teamIx)};
  }
  function foRefreshMatches(){
    UI.matchTab='Commentary';
    location.hash='#/matches';
    setTimeout(function(){ safeCall('pgMatches'); safeCall('fo55LiveTopbar'); },0);
  }

  completeRound=function(){
    if(window.__fo_advancing)return;
    window.__fo_advancing=true;
    try{
      if(window.__ap){clearInterval(window.__ap);window.__ap=null}
      seasonInit();
      var S=App.season; if(!S){return}
      if(S.round>=S.schedule.length){return}
      var roundNo=S.round, rd=S.schedule[roundNo]||[];
      /* 1. simulate every unplayed fixture (each isolated so one bad match can't wedge the round) */
      for(var i=0;i<rd.length;i++){
        var f=rd[i], key=fixtureKey(roundNo,f);
        if(S.played[key]!==undefined)continue;
        (function(f){ safe(function(){ simBackground(f[0],f[1],foSimMeta(f,roundNo)); }); })(f);
      }
      /* clear any lingering live-match state */
      M=null; App.pending=null; App.tossState=null;
      /* 2. weekly economy / market / cup / training — each isolated */
      safe(function(){
        econInit();
        var me=userTeam();
        ledger('Ground maintenance',-(me.seats||10000));
        ledger('Academies (Y'+(me.acadY||0)+'/S'+(me.acadS||0)+')',-(((me.acadY||0)+(me.acadS||0))*2500));
        var myLg=App.results.filter(function(r){return r.comp!=='youth'&&r.round===roundNo&&(r.home===me.name||r.away===me.name)});
        myLg.forEach(function(r){
          if(r.home===me.name){var att=attendance(me);ledger('Gate receipts ('+att.toLocaleString()+' att.)',att*9)}
          var won=r.result&&r.result.winner===me.name;
          me.mood=Math.max(0,Math.min(6,(me.mood==null?3:me.mood)+(won?1:-1)));

        });

      });

      safe(cupTick);
      safe(applyTraining);
      safe(function(){ if(typeof ensureFinance==='function')ensureFinance() });

      S.round=roundNo+1; App.round=S.round+1;
      safe(function(){ mpInit(); for(var k in App.mp.packets)if(App.mp.packets[k].round<S.round)delete App.mp.packets[k]; });
      safe(function(){
        var digest=App.results.filter(function(r){return r.comp==='league'&&r.round===roundNo})
          .map(function(r){return '<div class="bl">'+esc(r.result.text)+' <span class="small">('+esc(r.home)+' v '+esc(r.away)+')</span></div>'}).join('');
        var seasonDone=S.round>=S.schedule.length;
        App._digest='<div class="panel" style="border-left:4px solid #2d6a8f"><h4>Round '+(roundNo+1)+' complete</h4><div class="pad">'
          +(digest||'<span class="small">All fixtures simulated.</span>')
          +'<div class="small" style="margin-top:3px">'+(seasonDone?'Season complete - start the next season below.':'Advanced to round '+(S.round+1)+'. Training applied.')+'</div></div></div>';
      });
      safe(function(){saveGame(false)});
    }catch(e){
      console.error('[completeRound] fatal - forcing advance',e);
      safe(function(){var S=App.season; if(S&&S.round<S.schedule.length){S.round++;App.round=S.round+1;saveGame(false)}});
    }finally{
      window.__fo_advancing=false;
      foRefreshMatches();
    }
  };

  window.completeAIRound=function(){
    try{
      if(window.__ap){clearInterval(window.__ap);window.__ap=null}
      seasonInit();
      var S=App.season; if(!S||S.round>=S.schedule.length){return}
      var roundNo=S.round, rd=S.schedule[roundNo]||[], n=0;
      rd.forEach(function(f){
        var key=fixtureKey(roundNo,f), isUser=f[0]===App.teamIx||f[1]===App.teamIx;
        if(isUser||S.played[key]!==undefined)return;
        (function(f){ if(safe(function(){simBackground(f[0],f[1],foSimMeta(f,roundNo))})!==undefined||true)n++; })(f);
      });
      safe(function(){saveGame(false)});
      App._digest='<div class="panel" style="border-left:4px solid #2d6a8f"><h4>AI matches completed</h4><div class="pad">'
        +(n?n+' AI fixture'+(n===1?'':'s')+' simulated instantly.':'No AI fixtures left this round.')
        +'<div class="small">Your own match was left untouched - play it live, then advance the round.</div></div></div>';
    }catch(e){console.error('[completeAIRound]',e)}
    finally{ setTimeout(function(){ safeCall('pgMatches'); safeCall('fo55LiveTopbar'); },0); }
  };

  /* ---------- refresh current view with the new overrides ---------- */
  try{route&&route();safeCall('fo55LiveTopbar');safeCall('fo55Sanitize');}catch(e){console.error(e)}
})();
</script>

<script>
(function(){
  if(typeof document==='undefined')return;
  try{document.body.classList.add('ftpskin');}catch(e){}

  /* ---- FTP commentary feed builder (reads engine M.log, no engine change) ---- */
  function wkt(o){return o&&o.charAt(0)==='w'&&o!=='wide'}
  function ftpRslt(o){
    if(o==='4')return '<span class="four">4</span>';
    if(o==='6')return '<span class="six">6</span>';
    if(wkt(o))return '<span class="wicket">W</span>';
    if(o==='wide')return '<span class="exb">wd</span>';
    if(o==='noball')return '<span class="exb">nb</span>';
    if(o==='bye'||o==='legbye')return '<span class="exb">b</span>';
    if(o==='dot'||!o)return '.';
    return String(o);
  }
  function esc2(s){return (typeof esc==='function')?esc(s):String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
  function talentize(t){
    var h=esc2(t||'');
    ['SIX MACHINE','PARTNERSHIP BREAKER','New Ball Specialist','Golden Arm','Mystery Ball','Bouncer','Finisher','Lightning Hands','Rocket Arm','Safe Hands','Miser','Spin Killer','Pace Hunter','Fast Starter','Anchor','death specialist']
     .forEach(function(n){h=h.replace(new RegExp('('+n.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig'),'<span class="talent-hit">$1</span>');});
    return h;
  }
  function ftpPass(L,f){
    f=f||'all'; var t=L.txt||'';
    if(f==='all')return true;
    if(f==='wickets')return wkt(L.out)||/WICKET|out for/i.test(t);
    if(f==='boundaries')return L.out==='4'||L.out==='6';
    if(f==='overs')return L.mile||/End of over|DRINKS|Innings break/i.test(t);
    if(f==='highlights')return L.mile||wkt(L.out)||L.out==='4'||L.out==='6'||/DROPPED|FIFTY|HUNDRED/i.test(t);
    if(f==='talents')return /machine|breaker|specialist|golden arm|mystery|bouncer|finisher|lightning|rocket arm|safe hands|miser|killer|hunter|starter|anchor/i.test(t);
    return true;
  }
  window.ftpCommHTML=function(log,filter,limit){
    var rows=(log||[]).filter(function(L){return ftpPass(L,filter)}).slice(0,limit||140).map(function(L){
      if(L.mile||/^End of over/i.test(L.txt||'')){
        return '<div class="oversummary-bottom"><div class="text">'+talentize(L.txt)+'</div><div class="clear"></div></div>';
      }
      var rowcls=L.out==='4'?'four':L.out==='6'?'six':wkt(L.out)?'line wkt':'line';
      return '<div class="'+rowcls+'"><div class="del">'+esc2(L.no||'')+'</div><div class="rslt">'+ftpRslt(L.out)+
             '</div><div class="text">'+talentize(L.txt)+'</div><div class="clear"></div></div>';
    }).join('');
    return rows||'<div class="line"><div class="text" style="padding-left:8px">No commentary matches this filter.</div><div class="clear"></div></div>';
  };

  /* swap the commentary feed to FTP structure after every match render (engine + shell untouched) */
  if(typeof renderMatch==='function'){
    var _rm=renderMatch;
    renderMatch=function(){
      _rm();
      try{
        if(typeof M==='undefined'||!M||!M.log)return;
        var feed=document.querySelector('.ftpskin .commfeed');
        if(feed){
          feed.id='ftpcomm';
          feed.classList.remove('commbig');
          feed.innerHTML=ftpCommHTML(M.log,(typeof UI!=='undefined'&&UI.commFilter)||'all',140);
        }
      }catch(e){console.error('[ftpskin comm]',e);}
    };
  }

  /* re-render current page under the skin */
  try{if(typeof route==='function')route();}catch(e){console.error(e);}
})();
</script>

body.ftpskin #ftpcomm .oversummary-bottom,body.ftpskin #ftpcomm .oversummary-top{background:#eee;border-top:1px solid #d3d3d3;border-bottom:1px solid #d3d3d3;padding:5px 10px}
body.ftpskin #ftpcomm .oversummary-bottom .text{float:none;width:auto;padding:0;color:#333}
body.ftpskin #ftpcomm .line.wkt .text{color:#a33}
body.ftpskin #ftpcomm .four:hover,body.ftpskin #ftpcomm .six:hover,body.ftpskin #ftpcomm .line:hover{background:#fafafa}

/* toss line on scorecard */

<style id="fo-up3-css">
/* ===================== FIFTY OVERS — v9 correction CSS ===================== */

/* ---- #7 talents: clean, professional pill (no serif italic) ---- */
.foabil{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-style:normal;
  font-weight:600;font-size:10.5px;letter-spacing:.02em;color:#3f5a6b;background:#eef4f8;border:1px solid #cfe0ea;
  border-radius:11px;padding:1px 9px;cursor:help;display:inline-block;line-height:1.6;margin:0 1px}
.foabil:hover{background:#e2eef5;border-color:#b9d3e2}

/* ---- #1 club density ---- */
.fo-nextpanel .kv td:first-child{width:38%;color:#5a6a72}
.fo-star{background:#fff;border:1px solid var(--border,#d4d9de);border-left:4px solid var(--orange,#f18a1e);border-radius:5px;padding:9px 12px}
.fo-stars{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.fo-star-n{font-size:22px;font-weight:800;color:#152f40}
.formpip{display:inline-flex;width:20px;height:20px;align-items:center;justify-content:center;border-radius:50%;font-size:11px;font-weight:bold;color:#fff}
.formpip.w{background:#2f8f46}.formpip.l{background:#b23a33}.formpip.d{background:#8a8a8a}
.fo-form{display:flex;align-items:center;gap:5px}
.myrow td{background:#fff7d6!important}

/* ---- #5 player Skills panel: bigger + highlighted centerpiece ---- */
.fo-skills-panel{border:2px solid var(--blue,#3496bd);box-shadow:0 2px 12px rgba(52,150,189,.14)}
.fo-skills-panel>h4{font-size:13px;background:linear-gradient(180deg,#3aa3cb,#2f8db1)!important}
.fo-bigskill{display:flex;align-items:center;gap:10px;margin:7px 0;font-size:13px}
.fo-bigskill-l{min-width:92px;color:#33454f;font-weight:600}
.fo-bigskill-bar{flex:1;max-width:280px;height:14px;background:#e6ece6;border:1px solid #b6c2b6;border-radius:3px;overflow:hidden}
.fo-bigskill-bar i{display:block;height:100%}
.fo-bigskill-w{min-width:96px;font-weight:600;font-size:12.5px}

/* ---- #4 scorecard-page tabs ---- */
.fo-sctabs{display:flex;gap:4px;margin:8px 0 0;flex-wrap:wrap}
.fo-sctab{font-size:12px;padding:6px 16px;border:1px solid #c5c5c5;background:#f2f2f2;border-bottom:none;border-radius:4px 4px 0 0;cursor:pointer}
.fo-sctab.on{background:var(--blue,#3496bd);color:#fff;border-color:var(--blue-dark,#25789a)}
.fo-sctabs + .ftpskin{border-top:2px solid var(--blue,#3496bd);padding-top:10px}

/* ---- #9 ratings alignment (live + page) ---- */
.fo-ratingswrap table{width:100%;border-collapse:collapse;table-layout:auto}
.fo-ratingswrap th,.fo-ratingswrap td{padding:6px 10px;border-bottom:1px solid #eee}
.fo-ratingswrap td.n,.fo-ratingswrap th.n{text-align:right;white-space:nowrap;width:120px}
.fo-ratingswrap tr td:first-child,.fo-ratingswrap tr th:first-child{text-align:left}
.match-subpanel{min-width:0;margin-top:0}
.match-subpanel .panel{margin-bottom:8px}

/* ---- #8 ORDERS: fix truncation + stacked ends, no overflow ---- */
.fo-orders-main{grid-template-columns:minmax(340px,430px) minmax(0,1fr)!important}
.fo-batrow2{grid-template-columns:22px minmax(140px,1fr) 60px 12px 30px 40px!important;gap:6px!important}
.fo-batrow2 select{width:100%;min-width:0}
.fo-batrow2 .bskill{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px}
.fo-ends{grid-template-columns:1fr!important}          /* stack End A over End B — no horizontal overflow */
.fo-end{overflow:hidden}
.fo-end .spellrow{flex-wrap:wrap;gap:4px}
.fo-end .spellrow select{max-width:160px}
.fo-end .spellrow select:first-child{flex:1 1 150px;max-width:200px}
.fo-pool table{table-layout:auto}
.fo-orders-details{overflow:hidden}

/* ---- #2 over-summary top line (batsmen + bowler) ---- */
body.ftpskin #ftpcomm .oversummary-top{background:#eee;border-top:1px solid #d3d3d3;padding:5px 10px 2px}
body.ftpskin #ftpcomm .oversummary-top .text{float:none;width:auto;padding:0;color:#333}
body.ftpskin #ftpcomm .oversummary-top strong{color:#1d3a4d}
body.ftpskin #ftpcomm .oversummary-bottom{padding-top:2px}

</style>

<style id="fo-up4-css">
/* ===================== FIFTY OVERS — v10 CSS ===================== */

/* ---- #2/#10 THE alignment root cause: ftpskin's generic th{text-align:left} was
   beating th.n. Kill it once, everywhere. ---- */
body.ftpskin th.n,body.ftpskin td.n{text-align:right!important;white-space:nowrap}
table.fo-stattbl{width:100%;table-layout:fixed}
table.fo-stattbl th,table.fo-stattbl td{overflow:hidden;text-overflow:ellipsis;padding:5px 8px}
table.fo-stattbl th.n,table.fo-stattbl td.n{text-align:right!important}
table.fo-gridtbl td.n,table.fo-gridtbl th.n{text-align:right!important}

/* ---- #1 club header band + crest ---- */
.fo-clubband{background:linear-gradient(120deg,#1d4a66,#2f8db1 60%,#3aa3cb);border-radius:6px;
  padding:14px 20px;color:#fff;box-shadow:0 2px 10px rgba(20,60,90,.25);align-items:center;gap:16px;display:flex}
.fo-clubband h1{color:#fff!important;margin:2px 0 4px}
.fo-clubband .eyebrow{color:#cfe8f4!important}
.fo-clubband p,.fo-clubband .small{color:#dcedf6!important}
.fo-clubband .fo-form .small{color:#dcedf6!important}
.fo-clubband .fo-form{margin-left:auto}
img.fo-clubcrest{width:64px;height:64px;object-fit:contain;background:#fff;border-radius:10px;padding:6px;box-shadow:0 2px 6px rgba(0,0,0,.25)}

/* ---- #3 skills: one colour only ---- */
.fo-bigskill-bar i{background:#2f8f46!important}
.fo-bigskill-w{color:#33454f!important}
.fo-bigskill{cursor:help}
.fo-bigskill-sm .fo-bigskill-bar{max-width:200px;height:11px}
.fo-bigskill-sm{font-size:12px;margin:5px 0}

/* ---- #5 pinned intro line ---- */
body.ftpskin #ftpcomm .fo-introline{background:#f4efe0;border-top:2px solid #c8a13a;border-bottom:1px solid #d3d3d3;padding:7px 10px;font-style:normal}
body.ftpskin #ftpcomm .fo-introline .text{float:none;width:auto;padding:0;color:#4a4030;font-size:12px;line-height:1.5}

/* ---- #7/#8 equal Scoreboard / Match details boxes ---- */
.mc-top{display:grid!important;grid-template-columns:1fr 1fr!important;gap:10px;align-items:stretch}
.mc-top .panel{height:100%;margin-bottom:0;display:flex;flex-direction:column;min-width:0}
.mc-top .panel .pad{flex:1;position:relative}
.mc-score,.mc-details{flex:none!important;min-width:0!important;max-width:none!important}
.fo-detart{position:absolute;right:10px;bottom:8px;opacity:.85}
.fo-detart img{width:64px;height:64px;object-fit:contain}
@media(max-width:760px){.mc-top{grid-template-columns:1fr!important}}

/* ---- #9 bowling click-grid ---- */
.fo-gridrow{display:flex;gap:8px;align-items:flex-start;margin-bottom:6px;padding:5px;border:1px solid #e2e2e2;background:#fbfbfb;border-radius:4px}
.fo-gridside{flex:0 0 190px}
.fo-gridside select{width:100%}
.fo-gridcells{flex:1;line-height:1}
.fo-gcell{display:inline-block;width:17px;height:17px;line-height:17px;text-align:center;font-size:8px;margin:0 1px 2px 0;border:1px solid;border-radius:2px;user-select:none}
@media(max-width:820px){.fo-gridrow{flex-direction:column}.fo-gridside{flex-basis:auto}}

/* ---- #15 lineups ---- */
.fo-lineups{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:820px){.fo-lineups{grid-template-columns:1fr}}

/* ---- #17 full commentary, scrollable ---- */
body.ftpskin #ftpcomm{max-height:640px;overflow-y:auto}
.commfeed{max-height:640px;overflow-y:auto}

</style>

<script id="fo-up1-js">
/* ============================================================================
   FIFTY OVERS — 18-item UI upgrade  (presentation only, engine untouched)
   Appended AFTER all existing code so these overrides win.
   Assets (window.FO_ROLEIMG / window.FO_FLAG) are injected just above this.
   ============================================================================ */
(function(){
  if(typeof document==='undefined')return;
  var ROLEIMG=window.FO_ROLEIMG||{}, FLAG=window.FO_FLAG||{};

  /* ---------- asset helpers ---------- */
  var NORM={England:'ENG',Australia:'AUS',India:'IND',Pakistan:'PAK','Sri Lanka':'SRI',
    'New Zealand':'NZ','South Africa':'SAF',Netherlands:'NED','West Indies':'WI',
    Afghanistan:'AFG',Ireland:'IRE',Zimbabwe:'ZIM',Canada:'CAN',USA:'USA',Kenya:'KEN',
    Nepal:'NEP',Namibia:'NAM',Oman:'OMA',Scotland:'SCO',Bangladesh:'BAN',UAE:'UAE'};
  function foFlag(nat){var c=NORM[nat]||nat;var d=FLAG[c]||FLAG[nat];
    return d?'<img class="foflag" src="'+d+'" alt="'+c+'" title="'+c+'">':'';}
  function foRoleImg(p){var k=(typeof roleClass==='function')?roleClass(p):'bat';
    var d=ROLEIMG[k]||ROLEIMG.bat;var lbl={bat:'Batter',bowl:'Bowler',ar:'All-rounder',wk:'Wicketkeeper'}[k]||'Player';
    return d?'<img class="foric" src="'+d+'" alt="'+lbl+'" title="'+lbl+'">':'';}
  function foBT(p){return (!p||!p.btLabel||p.btLabel==='Does not bowl')?'':p.btLabel;}
  function foHand(p){return p&&p.hand==='L'?'LHB':'RHB';}
  window.foFlag=foFlag;window.foRoleImg=foRoleImg;window.foBT=foBT;
  window.foPoolSort=function(key,numeric){
    if(App._poolSort===key){App._poolDir=-App._poolDir;}
    else{App._poolSort=key;App._poolDir=numeric?-1:1;}
    pgOrders();
  };

  /* ability tooltip map (display name -> what it does) */
  var ABIL={};
  try{Object.keys(TALN).forEach(function(t){ABIL[ptal(t).toLowerCase()]=TALTIPS[t]||'';});}catch(e){}
  function foAbil(t){var name=(typeof ptal==='function')?ptal(t):t;var d=(typeof TALTIPS!=='undefined'&&TALTIPS[t])||'';
    return '<span class="foabil" title="'+String(d).replace(/"/g,'&quot;')+'">'+name+'</span>';}
  window.foAbil=foAbil;

  /* ================= #8 commentary: FTP "Bowler to Batsman :" prefix (text only) ============ */
  if(typeof window.comm==='function'){
    var _comm=window.comm;
    window.comm=function(inn,out,rb,sb,bowler,intent,field){
      var base=_comm.apply(this,arguments);
      try{
        var bwl=bowler&&bowler.name?bowler.name.split(' ').slice(-1)[0]:'';
        var bat=sb&&sb.p?sb.p.name.split(' ').slice(-1)[0]:'';
        if(bwl&&bat)return bwl+' to '+bat+' : '+base;
      }catch(e){}
      return base;
    };
  }
  /* ================= #7 capture toss text onto saved results ============ */
  if(typeof window.saveMatch==='function'){
    var _saveMatch=window.saveMatch;
    window.saveMatch=function(m){
      var r=_saveMatch.apply(this,arguments);
      try{if(r&&!r.toss){r.toss=(m&&m.meta&&m.meta.tossText)||(App.tossState&&App.tossState.txt)||null;}}catch(e){}
      return r;
    };
  }
  function foCommIntro(){
    try{
      if(typeof M==='undefined'||!M||!M.meta)return '';
      var m=M.meta;var crowd='a good crowd';
      try{var ht=GD.teams.find(function(t){return t.name===m.home;});if(ht&&typeof attendance==='function')crowd=attendance(ht).toLocaleString()+' spectators';}catch(e){}
      var toss=(App.tossState&&App.tossState.txt)||'';
      return '<div class="fo-comm-intro">A crowd of '+crowd+' has gathered at '+esc(m.ground)+' for '+esc(m.home)+' v '+esc(m.away)+
        ', with '+esc(m.weather||'Sunny')+' conditions and a '+esc(M.pitch)+' pitch. '+(toss?esc(toss)+' ':'')+
        'The players are ready — let battle commence.</div>';
    }catch(e){return '';}
  }
  window.foCommIntro=foCommIntro;

  /* ================= #6 role icons -> uploaded PNGs ================= */
  window.foRoleIcon=function(p){return foRoleImg(p);};

  /* v5's playerLink/playerMini already inject a role icon; strip it so each render
     places exactly ONE icon (fixes the double-cricket-icon on the squad page). */
  window.playerLink=function(p){return '<a href="#/player?n='+encodeURIComponent(p.name)+'" title="'+esc(playerTip(p))+'">'+esc(p.name)+'</a>';};
  window.playerMini=function(p){return '<span class="player-hoverable" title="'+esc(playerTip(p))+'">'+esc(p.name)+'</span>';};

  /* ================= #5/#6 squad Summary block (flag + role PNG) ================= */
  var _summaryBlock=window.summaryBlock;
  window.summaryBlock=function(p){
    var tr=(typeof ensureTraining==='function')?ensureTraining(p):null;

  /* ================= #3 draft tilt-with-a-floor by identity ================= */
  var _genDraftPool=window.genDraftPool;
  window.genDraftPool=function(seedStr){
    var pool=_genDraftPool(seedStr);
    try{
      var ident=(App&&App.founder&&App.founder.identity)||store('fo_identity')||'Balanced XI';
      var favBat=false,favPace=false,favSpin=false,favWK=false,favBowl=false,youth=false,money=false;
      if(ident==='Batting Machine')favBat=true;
      else if(ident==='Pace Battery')favPace=favBowl=true;
      else if(ident==='Spin Trap'){favSpin=favBowl=true;favWK=true;}
      else if(ident==='Youth Project')youth=true;
      else if(ident==='Moneyball Squad')money=true;
      // Balanced XI: no tilt.
      var isPace=function(p){return ['seamFast','seamFastMedium','seamMedium'].includes(p.bowlTypeFull);};
      var isSpin=function(p){return ['wristSpin','fingerSpin'].includes(p.bowlTypeFull);};
      var cls=function(p){return p.keeper?'wk':(p.role==='allRounder'?'ar':(p.bowlTypeFull&&p.bowlTypeFull!=='none'?'bowl':'bat'));};
      var bump=function(p,keys,amt){keys.forEach(function(k){if(p.skills[k]!=null)p.skills[k]=Math.min(96,Math.round(p.skills[k]*amt));});jsDerive(p);
        p.fee=Math.round((p.fee||20000)*(1+(amt-1)*0.9)/1000)*1000;};
      pool.forEach(function(p){
        var c=cls(p);
        // TILT ONLY BUFFS the favoured area -> other areas keep their existing floor (no nerf = no fabricated weakness)
        if(favBat&&(c==='bat'||c==='wk'))bump(p,['vsPace','vsSpin','rotation','power','temperament'],1.07);
        if(favPace&&isPace(p))bump(p,['wicket','economy','moveTurn','discipline'],1.08);
        if(favSpin&&isSpin(p))bump(p,['wicket','economy','variation','moveTurn'],1.08);
        if(favWK&&c==='wk')bump(p,['keeping','stumping','catching'],1.07);
        if(youth){ // cheaper, younger skew: nudge fees down, keep skills
          if(p.age<=24){p.fee=Math.round(p.fee*0.86/1000)*1000;}
        }
        if(money){ // undervalue role players: small fee discount for talented specialists
          if((p.talents&&p.talents.length)&&c!=='ar')p.fee=Math.round(p.fee*0.9/1000)*1000;
        }
      });
    }catch(e){console.error('[draft tilt]',e);}
    return pool;
  };

})();

    h.forEach(function(e){
      if(e.bb>0||e.o){b.inns++;b.runs+=e.rr||0;b.outs+=e.o?1:0;b.bf+=e.bb||0;b.hs=Math.max(b.hs,e.rr||0);
        if((e.rr||0)>=100)b.h100++;else if((e.rr||0)>=50)b.h50++;b.s4+=e.s4||0;b.s6+=e.s6||0;}
      if(e.cb>0){w.balls+=e.cb;w.runs+=e.cr||0;w.wkts+=e.w||0;
        if((e.w||0)>w.bestW||((e.w||0)===w.bestW&&(e.cr||0)<w.bestR)){w.bestW=e.w||0;w.bestR=e.cr||0;}}
    });
    return {b:b,w:w};
  }

  function keeperFromDismissals(inn){

      if(m){var nm=m[1].trim();counts[nm]=(counts[nm]||0)+1;}});
    var best=null,bv=0;for(var k in counts)if(counts[k]>bv){bv=counts[k];best=k;}
    return best;
  }

<script id="fo-up4-js">
/* ============================================================================
   FIFTY OVERS — v10 (loads LAST; wins over patches 1-3)
   1 club header band+icon · 2 stat-table alignment · 3 single-colour skills ·
   4 skill hover ladders · 5 match intro pinned in commentary · 6 talents filter ·
   7/8 equal score/details boxes + filler · 9 bowling over-grid · 10 squad grid

(function(){

  /* ============ #13 FATIGUE SPECTRUM (layer around the engine; engine math untouched) ============ */
  function fatWordOf(n){n=+n||0;return n>=96?'clinically dead':n>=88?'shattered':n>=78?'exhausted':n>=68?'listless':n>=56?'weary':n>=44?'moderate':n>=34?'satisfactory':n>=24?'passable':n>=14?'energetic':n>=5?'revived':'rested';}
  function fatSync(p){if(p.fatN==null){var f=String(p.fatigue||'rested').toLowerCase();p.fatN=({rested:0,revived:8,energetic:18,passable:28,satisfactory:38,moderate:50,weary:62,listless:72,exhausted:82,shattered:91,'clinically dead':99})[f]||0;}p.fatWord=fatWordOf(p.fatN);p.fatigue=p.fatWord;}
  window.foFatSyncAll=function(){try{for(var i=0;i<GD.teams.length;i++){var t=GD.teams[i];
    (t.players||[]).concat(t.youth||[]).forEach(function(p){fatSync(p);if(!p.formWord)p.formWord=(typeof FORMW!=='undefined'?FORMW[p.formIx==null?3:p.formIx]:'steady');});}}catch(e){}};
  /* accumulate at match save: workload-based, captain surcharge */

        m.innings.forEach(function(inn){if(!inn)return;
          inn.bat.forEach(function(b){if(!(b.b>0||b.out))return;var pl=findPlayer(b.p.name);if(!pl)return;var p=pl.p;
            if(p.fatN==null)fatSync(p);
            p.fatN=Math.min(100,p.fatN + 4 + b.b*0.16 + (p.keeper?4:0) + (caps[p.name]?4:0));fatSync(p);});
          for(var k in inn.bowlers){var br=inn.bowlers[k];var pl2=findPlayer(k);if(!pl2)continue;var p2=pl2.p;
            if(p2.fatN==null)fatSync(p2);

        });

  }

          var rec=14+(p.age<=22?7:p.age<=27?4:p.age<=31?1:-3);

    };
  }

  window.foCalibrateBots=function(force){
    try{
      if(!GD.teams.some(function(t){return t.founded;}))return 'no founded club yet';

  // If the user signed up with an invite code (and email confirmation was on, so

    if (!p || !p.code) { lsDel(PEND); return Promise.resolve(); }
    return rpc("redeem_invite", { p_code: p.code, p_display_name: p.dn, p_team_name: p.tn || (p.dn + " XI") })

  // Detect a "table not created yet" error (0011/0012 SQL not run in Supabase).
  function isMissingTable(e) { var m = ((e && e.message) || e || "") + ""; return /PGRST205|Could not find the table|schema cache|does not exist/i.test(m); }
  function setupNeeded() {
    openWrap(true); setNavy(false);
    var who = wrap.querySelector("#folWho"); if (who) who.textContent = LG ? LG.name : "";
    main.innerHTML = '<div class="folbody"><div class="folcard"><h4>Almost ready</h4><div class="folpad">' +
      '<div class="folsmall" style="margin-bottom:10px;line-height:1.5">This league still needs its sync tables in your database. Open <b>Supabase → SQL Editor</b>, run the setup SQL (the 0011 and 0012 snippets), then reload this page.</div>' +
      '<button class="mini" data-act="logout">log out</button>' +
      "</div></div></div>";
  }

  function syncTick(first) {
    if (!LG) return Promise.resolve();
    return sel("league_state", "league_id=eq." + LG.id + "&select=snapshot,version,round").then(function (a) {
      var st = a[0];
      if (st) {
        if (st.version > SYNC.lastVersion) { SYNC.lastVersion = st.version; applySnapshot(st.snapshot, first); }
        else openWrap(false);
        schedulePoll();
      } else {
        return preStart();
      }
    }).catch(function (e) {
      if (isMissingTable(e)) { setupNeeded(); return; }
      console.warn("Fifty Overs syncTick error", e);
      if (!SYNC.started) return preStart().catch(function (e2) { if (isMissingTable(e2)) setupNeeded(); else say(e2); });
      schedulePoll();
    });
  }

  // Load the shared league snapshot into the game and point it at MY club.
  function applySnapshot(snap, focus) {
    try {
      var prevRound = (window.App && App.season && typeof App.season.round === "number") ? App.season.round : -1;
      var myOrders = (window.App && App.orders) ? App.orders : null;
      if (typeof window.restoreFrom === "function") window.restoreFrom(snap);
      SYNC.started = true;
      var myName = SYNC.myTeam ? SYNC.myTeam.name : null;
      if (myName && typeof GD !== "undefined" && GD.teams) {
        var ix = GD.teams.findIndex(function (t) { return t.name === myName; });
        if (ix >= 0) App.teamIx = ix;
      }
      // keep my working line-up; if the round advanced, it needs re-saving for the new round
      var newRound = (window.App && App.season && typeof App.season.round === "number") ? App.season.round : prevRound;
      if (myOrders) { App.orders = myOrders; if (newRound !== prevRound) App.orders.saved = false; }
      try { if (typeof window.store === "function") window.store("fo_welcomed", "1"); } catch (e) {}
      if (typeof window.saveGame === "function") window.saveGame(false);
      openWrap(false);
      if (focus) location.hash = "#/club";
      if (typeof window.route === "function") window.route();
    } catch (e) { console.warn("Fifty Overs applySnapshot failed", e); }
  }

  function startLeague() {
    var defaults = (typeof GD !== "undefined" && GD.teams) ? GD.teams.slice() : [];
    sel("league_clubs", "league_id=eq." + LG.id + "&select=club,manager_id").then(function (clubs) {
      if (!clubs || !clubs.length) { say("Draft your squad first, then start the season."); return; }
      try {
        var world = clubs.map(function (c) { return c.club; });
        if (world.length < 2) {
          var used = {}; world.forEach(function (t) { used[t.name] = 1; });
          var bots = defaults.filter(function (t) { return !used[t.name]; }).slice(0, Math.max(0, 4 - world.length));
          world = world.concat(bots);

        GD.teams = world;
        if (typeof window.econInit === "function") window.econInit();
        var myName = SYNC.myTeam ? SYNC.myTeam.name : null;
        var mine = GD.teams.findIndex(function (t) { return t.name === myName; });
        App.teamIx = mine >= 0 ? mine : 0;
        App.season = null; if (typeof window.seasonInit === "function") window.seasonInit();
        App.round = 1; App.seasonNo = App.seasonNo || 1; App.results = [];
        App.cup = { stage: 0, alive: null, results: [], out: false };
        if (typeof window.mpInit === "function") window.mpInit();
        try { if (typeof window.store === "function") window.store("fo_welcomed", "1"); } catch (e) {}
        if (typeof window.saveGame === "function") window.saveGame(false);
        var snap = (typeof window.snapshot === "function") ? window.snapshot(true) : null;

    }).catch(function () {});

  // ============================================================================
  // IN-GAME DRAFT: build a balanced, country-flavoured, unique pool from the
  // manager's server draft_seed, drive the game's real draft screen (pgFounder),
  // relabel the confirm button to "Start Season", and save the squad on confirm.
  // ============================================================================

  // 42 balanced players (same tier structure for everyone), all set to the
  // manager's country with country names, deterministic from their draft_seed.
  function buildCountryPool(seedInt, country) {
    var prev = App.founder;
    App.founder = { identity: "Balanced XI" };   // neutral tilt so pools are equally strong
    var pool;
    try { pool = window.genDraftPool("league-" + (seedInt >>> 0)); }
    finally { App.founder = prev; }
    var rnd = window.rng((seedInt >>> 0) ^ 0x9e3779b9), used = new Set();
    pool.forEach(function (p) {
      p.nat = country;
      var nm = window.natName(country, rnd, used); used.add(nm); p.name = nm;
      fixTechniquePower(p, rnd);
    });
    return pool;
  }

  // Enforce realistic technique/power relationships on a generated player, using
  // the game's own aggregate formulas (aggBat/aggBowl/aggTech). A "level" = 6.25.
  //   technique  = within 2 levels BELOW the headline batting/bowling skill
  //   power      = equal to, or 1–4 levels below, technique
  function fixTechniquePower(p, rnd) {
    var LV = 6.25, s = p.skills || {};
    var clamp = function (v) { return Math.max(5, Math.min(95, Math.round(v))); };
    var isBowler = p.bowlTypeFull && p.bowlTypeFull !== "none";
    var batAgg = 0.25 * s.vsPace + 0.25 * s.vsSpin + 0.2 * s.rotation + 0.15 * s.temperament + 0.15 * s.power;
    var bowlAgg = isBowler ? (s.wicket + s.economy + s.discipline + s.moveTurn + s.variation + s.stamina) / 6 : 0;
    var headline = Math.max(batAgg, bowlAgg);

    // technique target: at least ~1 level below headline (ideally lower), and no
    // more than 2 levels below. The 1-level cap absorbs the aggregate's slight
    // self-reference so technique lands reliably below the headline.
    var curTech = (s.vsPace + s.vsSpin + s.temperament) / 3;
    var techTarget = Math.max(headline - 2 * LV, Math.min(headline - 1.0 * LV, curTech));
    var dTech = techTarget - curTech;
    s.vsPace = clamp(s.vsPace + dTech); s.vsSpin = clamp(s.vsSpin + dTech); s.temperament = clamp(s.temperament + dTech);

    // power: equal to or 1–4 levels below the new technique
    var newTech = (s.vsPace + s.vsSpin + s.temperament) / 3;
    s.power = clamp(Math.max(newTech - 4 * LV, Math.min(newTech - (rnd() < 0.5 ? 0 : LV * (1 + rnd() * 3)), s.power)));

    if (typeof window.jsDerive === "function") window.jsDerive(p);   // recompute rating
  }

  window.__folBuildPool = buildCountryPool;   // debug/test hook (harmless)

  // Draft happens in the game's OWN founder screen (pgFounder). We hand it a
  // balanced, country-flavoured pool derived from the server draft_seed.
  function startDraft(team) {
    if (typeof window.genDraftPool !== "function" || typeof window.pgFounder !== "function") { say("Game engine not ready. Reload the page and try again."); return; }
    var pool = buildCountryPool(team.draft_seed, team.country);
    App.founder = {
      name: team.name, budget: 1000000, pool: pool, picked: [], identity: "Balanced XI",
      mgr: (SYNC && SYNC.me && SYNC.me.display_name) || "Manager",
      __league: { league_id: LG.id, team_id: team.id }
    };
    openWrap(false);                       // hand the screen to the game's draft
    try { window.pgFounder(); } catch (e) { say(e); }
  }

  // relabel the confirm button to "Start Season" while in league draft mode
  if (typeof window.pgFounder === "function") {
    var _pg = window.pgFounder;
    window.pgFounder = function () {
      var out = _pg.apply(this, arguments);
      try {
        if (App.founder && App.founder.__league) {
          var b = document.querySelector("#page .confirmbtn");
          if (b) b.textContent = "🏏 Confirm my squad";
        }
      } catch (e) {}
      return out;
    };
  }

  // On confirm in league mode, let the game build the club into GD.teams (so it
  // is a real, valid club record), then upload it. The season starts when the
  // commissioner has everyone's clubs.
  if (typeof window.founderConfirm === "function") {
    var _fc = window.founderConfirm;
    window.founderConfirm = function () {
      var lg = App.founder && App.founder.__league;
      var out = _fc.apply(this, arguments);   // game writes the drafted squad into GD.teams[teamIx]
      if (lg) {
        try {
          var club = JSON.parse(JSON.stringify(GD.teams[App.teamIx]));
          rpc("push_club", { p_league_id: lg.league_id, p_club: club, p_team_ix: null }).then(function () {
            say("🏏 Squad locked in! Waiting for the commissioner to start the season.");
            showWait(true);
          }).catch(say);
        } catch (e) { say(e); }
      }
      return out;
    };
  }

  // Multiplayer-first: the league login takes over the moment the site loads,
  // and the page behind it is locked so the solo game stays private until you
  // are in a league — then your game IS the league.
  openWrap(true);
  if (!JWT) renderLogin(); else enterApp();

  console.info("Fifty Overs League overlay ready.");
})();

</script>
