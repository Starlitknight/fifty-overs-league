/* ================= FULL UPGRADE DESIGN SYSTEM ================= */
:root{--bg:#edf0f2;--surface:#ffffff;--surface-soft:#f7fafc;--border:#d4d9de;--nav:#303030;--blue:#3496bd;--blue-dark:#25789a;--orange:#f18a1e;--green:#2f8f46;--red:#b23a33;--gold:#c99a2e;--text:#202428;--muted:#66717a;--shadow-sm:0 1px 2px rgba(0,0,0,.08);--shadow-md:0 3px 10px rgba(0,0,0,.10);--radius:4px}
body{background:var(--bg);color:var(--text);font:13px Verdana,Aptos,system-ui,sans-serif;line-height:1.48}
.wrap{max-width:1280px;padding:14px 16px}.wrap.match-mode{max-width:1440px}
#topbar{background:var(--nav);border-bottom:3px solid var(--blue);gap:0;flex-wrap:nowrap;overflow-x:auto}
#topbar a{font-size:12px;padding:9px 10px;white-space:nowrap}#topbar .brand{font-size:14px;padding:9px 14px 9px 4px;white-space:nowrap}
#topbar a.on{background:var(--blue);box-shadow:inset 0 -3px 0 var(--orange)}#fo-top-status{margin-left:auto;display:flex;gap:10px;align-items:center;white-space:nowrap;color:#e9eef2;font-size:11px;padding:0 8px}#fo-top-status span{border-left:1px solid #5b5b5b;padding-left:10px}
.panel,.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-sm);margin-bottom:12px}.panel>h4,.card-title{background:linear-gradient(180deg,var(--blue),var(--blue-dark));color:#fff;font-weight:bold;font-size:12.5px;padding:7px 10px;margin:0;border-radius:var(--radius) var(--radius) 0 0}.card-body{padding:11px 12px}.panel .pad{padding:10px 12px}
.crumb{font-size:14px;border-left:4px solid var(--orange);margin-bottom:12px}.page-head{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;margin:4px 0 14px}.page-head h1,.welcome-hero h1{font-size:26px;line-height:1.1;margin:3px 0 5px;color:#162a3a}.page-head p,.welcome-hero p{color:var(--muted);margin:0;max-width:760px}.eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--blue-dark);font-weight:bold}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:12px}.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;box-shadow:var(--shadow-sm)}.kpi-card span{display:block;color:var(--muted);font-size:11px}.kpi-card b{display:block;font-size:18px;margin-top:2px;color:var(--text)}

.page-grid-2{display:grid;grid-template-columns:minmax(0,1fr) minmax(320px,.75fr);gap:14px}.page-grid-3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}.page-grid-draft{display:grid;grid-template-columns:minmax(0,1fr) 330px;gap:14px;align-items:start}.draft-sticky{position:sticky;top:8px}
